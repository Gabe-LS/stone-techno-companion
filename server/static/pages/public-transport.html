<!DOCTYPE html>
<html lang="en">
<head>

<title>107 / NE2 — Zollverein → Hbf</title>
<style>
  :root {
    --color-bg: #f8f8f8;
    --color-surface: #ffffff;
    --color-text: #111111;
    --color-text-secondary: #4a4a4a;
    --color-text-past: #757575;
    --color-border: #ebebeb;
    --color-accent: #111111;
    --color-accent-soft: #333333;
    --color-ne2-bg: #2d2d2d;
    --color-ne2-text: #f5c518;
    --color-next-bg: #f0f7ff;
    --color-next-border: #3b82f6;
    --color-next-text: #1d4ed8;
    --color-too-late-text: #757575;
    --color-location-bg: #f0f7ff;
    --color-location-border: #c7d9f0;
    --color-location-btn: #3b82f6;
    --font-sm: 0.6875rem;
    --font-md: 0.8125rem;
    --font-lg: 0.9375rem;
    --font-header: 1.0625rem;
    --radius: 0.75rem;
    --radius-sm: 0.375rem;
    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-5: 1.25rem;
    --space-6: 1.5rem;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.4;
    padding: env(safe-area-inset-top) var(--space-4) var(--space-5);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--color-bg);
    margin: 0 calc(-1 * var(--space-4));
    padding: 0 var(--space-4) var(--space-3);
  }

  header {
    background: var(--color-accent);
    color: #fff;
    padding: var(--space-4) var(--space-4);
    margin: 0 calc(-1 * var(--space-4));
  }

  .header-route {
    font-size: var(--font-header);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-info {
    font-size: var(--font-sm);
    opacity: 0.6;
    margin-top: var(--space-1);
    font-weight: 400;
  }

  .location-banner {
    background: var(--color-location-bg);
    border: 1px solid var(--color-location-border);
    border-radius: var(--radius);
    padding: var(--space-2) var(--space-4);
    margin-top: var(--space-3);
    font-size: var(--font-sm);
    color: var(--color-text);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  .location-banner button {
    background: var(--color-location-btn);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: var(--space-1) var(--space-3);
    font-size: var(--font-sm);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .location-banner button:active {
    opacity: 0.8;
  }

  .location-text {
    flex: 1;
    min-width: 0;
  }

  .day-tab-bar {
    display: flex;
    gap: var(--space-1);
    margin-top: var(--space-3);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .day-tab {
    flex: 1;
    min-width: 0;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-1);
    text-align: center;
    font-size: var(--font-sm);
    font-weight: 600;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .day-tab[aria-selected="true"] {
    background: var(--color-accent);
    color: #fff;
    border-color: var(--color-accent);
  }

  .day-tab-count {
    display: block;
    font-weight: 400;
    font-size: var(--font-sm);
    opacity: 0.6;
    margin-top: var(--space-1);
  }

  .day-panel {
    display: none;
  }

  .day-panel[aria-hidden="false"] {
    display: block;
  }

  .dep-list {
    list-style: none;
  }

  .dep-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }

  .dep-item:first-child {
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .dep-item:last-child {
    border-bottom: none;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .dep-item:only-child {
    border-radius: var(--radius);
  }


  .dep-item.is-past {
    color: var(--color-text-past);
  }

  .dep-item.is-past .dep-time {
    color: var(--color-text-past);
  }

  .dep-item.is-past .line-badge {
    opacity: 0.35;
  }

  .dep-item.is-too-late {
    color: var(--color-too-late-text);
  }

  .dep-item.is-too-late .dep-time {
    color: var(--color-too-late-text);
    text-decoration: line-through;
  }

  .dep-item.is-too-late .line-badge {
    opacity: 0.2;
  }

  .dep-item.is-next {
    background: var(--color-next-bg);
    border-left: 3px solid var(--color-next-border);
    padding-left: calc(var(--space-4) - 3px);
  }

  .dep-item.is-next .dep-time {
    color: var(--color-next-text);
    font-weight: 700;
  }

  .dep-time {
    font-size: var(--font-md);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    color: var(--color-text);
  }

  .line-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    font-weight: 700;
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    min-width: 2.25rem;
    flex-shrink: 0;
  }

  .line-badge.l-107 {
    background: var(--color-accent);
    color: #fff;
  }

  .line-badge.l-NE2 {
    background: var(--color-ne2-bg);
    color: var(--color-ne2-text);
  }

  .dep-dest {
    font-size: var(--font-md);
    color: var(--color-text-secondary);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dep-item.is-past .dep-dest {
    color: var(--color-text-past);
  }

  .dep-item.is-too-late .dep-dest {
    color: var(--color-too-late-text);
  }

  .dep-walk {
    font-size: var(--font-sm);
    color: var(--color-text-secondary);
    flex-shrink: 0;
    text-align: right;
    white-space: nowrap;
  }

  .dep-item.is-past .dep-walk,
  .dep-item.is-too-late .dep-walk {
    color: var(--color-too-late-text);
  }

  .empty-state {
    text-align: center;
    padding: var(--space-6) var(--space-4);
    color: var(--color-text-secondary);
    font-size: var(--font-md);
  }

  @media (min-width: 420px) {
    :root {
      --font-sm: 0.75rem;
      --font-md: 0.875rem;
      --font-lg: 1rem;
      --font-header: 1.125rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      transition: none !important;
      scroll-behavior: auto !important;
    }
  }
</style>

<script>
(function () {
  "use strict";

  var data = null;
  var walkMinutes = null;
  var activeDay = 0;

  var STOP_LAT = 51.486095;
  var STOP_LNG = 7.046062;
  var WALK_SPEED_KMH = 4.5;

  function parseDate(dateStr) {
    var p = dateStr.split(".");
    return { day: parseInt(p[0], 10), month: parseInt(p[1], 10), year: parseInt(p[2], 10) };
  }

  function depToMinutes(dep) {
    var p = dep.split(":");
    return parseInt(p[0], 10) * 60 + parseInt(p[1], 10);
  }

  function serviceDayMinutes(dep, isAfterMidnight) {
    var m = depToMinutes(dep);
    return isAfterMidnight ? m + 1440 : m;
  }

  function getNow() {
    var params = new URLSearchParams(window.location.search);
    var now;
    var pDate = params.get("date");
    var pTime = params.get("time");
    if (pDate && pTime) {
      var dp = pDate.split(".");
      var tp = pTime.split(":");
      now = new Date(parseInt(dp[2]), parseInt(dp[1]) - 1, parseInt(dp[0]), parseInt(tp[0]), parseInt(tp[1]));
    } else {
      now = new Date();
    }
    return {
      year: now.getFullYear(),
      month: now.getMonth() + 1,
      day: now.getDate(),
      hours: now.getHours(),
      minutes: now.getMinutes(),
      nowServiceMinutes: now.getHours() < 4
        ? now.getHours() * 60 + now.getMinutes() + 1440
        : now.getHours() * 60 + now.getMinutes()
    };
  }

  function findTodayIndex() {
    var now = getNow();
    for (var i = 0; i < data.days.length; i++) {
      var d = parseDate(data.days[i].date);
      if (d.day === now.day && d.month === now.month && d.year === now.year) return i;
      if (now.hours < 4) {
        var yesterday = new Date(now.year, now.month - 1, now.day - 1);
        if (d.day === yesterday.getDate() && d.month === yesterday.getMonth() + 1 && d.year === yesterday.getFullYear()) return i;
      }
    }
    return 0;
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function renderTabs() {
    var tabs = document.getElementById("day-tabs");
    tabs.innerHTML = "";
    for (var i = 0; i < data.days.length; i++) {
      var d = data.days[i];

      btn.className = "day-tab";
      btn.setAttribute("role", "tab");
      btn.setAttribute("aria-selected", i === activeDay ? "true" : "false");
      btn.dataset.index = i;
      btn.innerHTML = '<span>' + d.day + '</span><span class="day-tab-count">' + d.date + '</span>';
      btn.addEventListener("click", onTabClick);
      tabs.appendChild(btn);
    }
  }

    var idx = parseInt(e.currentTarget.dataset.index, 10);
    activeDay = idx;
    renderTabs();
    renderPanel();
  }

  function renderPanel() {
    var panels = document.getElementById("day-panels");
    panels.innerHTML = "";

    var dayData = data.days[activeDay];
    if (!dayData || dayData.departures.length === 0) {
      panels.innerHTML = '<div class="empty-state">No departures available</div>';
      return;
    }

    var panel = document.createElement("div");
    panel.className = "day-panel";
    panel.setAttribute("aria-hidden", "false");
    panel.setAttribute("role", "tabpanel");

    var list = document.createElement("ul");
    list.className = "dep-list";

    var now = getNow();
    var parsedDate = parseDate(dayData.date);
    var isToday = parsedDate.day === now.day && parsedDate.month === now.month && parsedDate.year === now.year;
    if (now.hours < 4) {
      var yesterday = new Date(now.year, now.month - 1, now.day - 1);
      if (parsedDate.day === yesterday.getDate() && parsedDate.month === yesterday.getMonth() + 1 && parsedDate.year === yesterday.getFullYear()) {
        isToday = true;
      }
    }

    var nextFound = false;
    var scrollTarget = null;
    var prevMinutes = null;

    for (var i = 0; i < dayData.departures.length; i++) {
      var dep = dayData.departures[i];
      var depMin = depToMinutes(dep.dep);
      var isAfterMidnight = depMin < 240;
      var svcMin = serviceDayMinutes(dep.dep, isAfterMidnight);

      prevMinutes = svcMin;

      var li = document.createElement("li");
      li.className = "dep-item";

      var isPast = false;
      var isTooLate = false;
      var isNext = false;

      if (isToday) {
        if (svcMin < now.nowServiceMinutes) {
          isPast = true;
        } else if (!nextFound) {
          if (walkMinutes !== null) {
            var leaveBy = svcMin - walkMinutes;
            if (leaveBy < now.nowServiceMinutes) {
              isTooLate = true;
            } else {
              isNext = true;
              nextFound = true;
            }
          } else {
            isNext = true;
            nextFound = true;
          }
        }
      }

      if (isPast) li.classList.add("is-past");
      if (isTooLate) li.classList.add("is-too-late");
      if (isNext) {
        li.classList.add("is-next");
        scrollTarget = li;
      }

      var timeEl = document.createElement("span");
      timeEl.className = "dep-time";
      timeEl.textContent = dep.dep;

      var badge = document.createElement("span");
      badge.className = "line-badge l-" + dep.line;
      badge.textContent = dep.line;

      var dest = document.createElement("span");
      dest.className = "dep-dest";
      dest.textContent = dep.direction.replace("Essen ", "");

      li.appendChild(timeEl);
      li.appendChild(badge);
      li.appendChild(dest);

      if (walkMinutes !== null && !isPast) {
        var walkEl = document.createElement("span");
        walkEl.className = "dep-walk";
        var minsLeft = svcMin - now.nowServiceMinutes;
        if (minsLeft > 0 && isToday) {
          walkEl.textContent = minsLeft + " min";
        }
        li.appendChild(walkEl);
      }

      list.appendChild(li);
    }

    panel.appendChild(list);
    panels.appendChild(panel);

    if (scrollTarget) {
      setTimeout(function () {
        scrollTarget.scrollIntoView({ block: "center", behavior: "smooth" });
      }, 100);
    }
  }

  function fetchWalkRoute(lat, lng) {
    var url = "https://router.project-osrm.org/route/v1/driving/" +
      lng + "," + lat + ";" + STOP_LNG + "," + STOP_LAT +
      "?overview=false";
    return fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d.code !== "Ok" || !d.routes || !d.routes.length) return null;
        return { distanceM: d.routes[0].distance };
      })
      .catch(function () { return null; });
  }

  function fmtNum(n) {
    return n.toLocaleString("de-DE");
  }

  function fmtDist(meters) {
    if (meters < 1000) return fmtNum(Math.round(meters)) + " m";
    return fmtNum(parseFloat((meters / 1000).toFixed(1))) + " km";
  }

  function applyWalkData(distanceM) {
    walkMinutes = Math.ceil((distanceM / 1000) / WALK_SPEED_KMH * 60);
    var banner = document.getElementById("location-banner");
    banner.querySelector(".location-text").textContent =
      fmtDist(distanceM) + " walk — " + fmtNum(walkMinutes) + " min to stop";
    var btn = document.getElementById("locate-btn");
    btn.textContent = "Update";
    renderPanel();
  }

  function updateLocation(lat, lng) {
    var banner = document.getElementById("location-banner");
    banner.querySelector(".location-text").textContent = "Calculating route...";

    fetchWalkRoute(lat, lng).then(function (result) {
      if (result) {
        applyWalkData(result.distanceM);
      } else {
        var dist = haversineKm(lat, lng, STOP_LAT, STOP_LNG);
        var walkMin = Math.ceil((dist / WALK_SPEED_KMH) * 60);
        walkMinutes = walkMin;
        banner.querySelector(".location-text").textContent =
          "~" + fmtDist(dist * 1000) + " — ~" + fmtNum(walkMin) + " min (estimate)";
        document.getElementById("locate-btn").textContent = "Update";
        renderPanel();
      }
    });
  }

  function onLocateClick() {
    if (!navigator.geolocation) {
      document.querySelector(".location-text").textContent = "Geolocation not supported";
      return;
    }

    var btn = document.getElementById("locate-btn");
    btn.textContent = "...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        btn.disabled = false;
        updateLocation(pos.coords.latitude, pos.coords.longitude);
      },
      function () {
        btn.disabled = false;
        btn.textContent = "Retry";
        document.querySelector(".location-text").textContent = "Location access denied";
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function loadData(d) {
    data = d;
    if (d.stop) {
      STOP_LAT = d.stop.lat;
      STOP_LNG = d.stop.lng;
    }
    activeDay = findTodayIndex();
    renderTabs();
    renderPanel();
  }

  function init() {
    if (typeof TIMETABLE_DATA !== "undefined") {
      loadData(TIMETABLE_DATA);
    } else {
      fetch("timetable.json")
        .then(function (r) { return r.json(); })
        .then(loadData)
        .catch(function () {
          document.getElementById("day-panels").innerHTML =
            '<div class="empty-state">Could not load timetable data.</div>';
        });
    }

    document.getElementById("locate-btn").addEventListener("click", onLocateClick);

    setInterval(function () {
      if (data) renderPanel();
    }, 30000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
