<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#111">
<link rel="stylesheet" href="/shared.css">
<script src="/shared.js"></script>
<title>107 / NE2 — Zollverein → Hbf</title>
<style>
  :root {
    /* Transport-specific tokens only. Colors, fonts, spacing, and radii come
       from shared.css and must never be shadowed here. The blue next-departure
       highlight is a deliberate semantic exception (status: upcoming), like
       the NE2 brand yellow. */
    --badge-107-bg: var(--gray-900);
    --color-ne2-bg: #2d2d2d;
    --color-ne2-text: #f5c518;
    --transport-next-bg: #f0f7ff;
    --transport-next-border: #3b82f6;
    --transport-next-text: #1d4ed8;
    --color-delay: var(--color-accent);
    --color-ontime: var(--color-success);
    --color-live-dot: var(--color-success);
    --color-canceled-bg: #fef2f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    -webkit-text-size-adjust: 100%;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar { display: none; }

  body {
    font-family: var(--font-family);
    background: var(--color-bg);
    color: var(--color-text);
    max-width: 960px;
    margin: 0 auto;
    padding: 0 var(--space-xl) var(--space-xl);
    min-height: 100dvh;
  }

  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--color-bg);
    padding-bottom: var(--space-md);
  }





  .live-indicator {
    display: none;
    align-items: center;
    gap: 0.35rem;
    font-size: var(--font-xs);
    font-weight: 600;
    color: #fff;
    opacity: 0.9;
    flex-direction: column;
    align-items: flex-end;
  }

  .live-indicator.active { display: flex; }

  .live-label {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .live-updated {
    font-size: var(--font-xs);
    font-weight: 400;
    opacity: 0.75;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-live-dot);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .location-banner {
    background: var(--gray-50);
    border: 1px solid var(--color-surface-hover);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    margin-top: var(--space-md);
    font-size: var(--font-sm);
    color: var(--color-text);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .location-banner button {
    background: var(--gray-900);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    min-width: 102px; /* width of the wider label (Locate me), so switching to Update does not shift layout */
    font-size: var(--font-sm);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .location-banner button:active { opacity: 0.8; }
  .location-banner button:focus:not(:focus-visible) { outline: none; }
  .location-banner button:focus-visible { outline: 2px solid var(--gray-900); outline-offset: 2px; }
  @media (hover: hover) { .location-banner button:hover { background: var(--gray-800); } }
  .location-text { flex: 1; min-width: 0; }

  .day-tab-bar {
    display: flex;
    gap: 2px;
    margin-top: var(--space-md);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tab-bar::-webkit-scrollbar { display: none; }

  .day-tab {
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 7px 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: var(--color-surface);
    color: var(--color-text);
    font-size: var(--font-sm);
    font-weight: 600;
    transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .day-tab:focus:not(:focus-visible) { outline: none; }
  .day-tab:focus-visible { outline: 2px solid var(--color-text); outline-offset: 2px; }
  @media (hover: hover) { .day-tab:hover:not(.active) { background: var(--color-surface-hover); } }

  .day-tab.active {
    background: var(--color-text);
    color: var(--color-bg);
    border-color: var(--color-text);
  }

  .day-tab-count {
    display: block;
    font-weight: 400;
    font-size: var(--font-xs);
    color: var(--gray-500);
    margin-top: 2px;
  }
  .day-tab.active .day-tab-count { color: var(--gray-400); }

  .day-panel { display: none; }
  .day-panel[aria-hidden="false"] { display: block; }

  .dep-list { list-style: none; padding: 0; margin: 0; }

  /* Exact clone of the lineup's li.artist-item card */
  .dep-item {
    display: flex;
    align-items: center;
    gap: var(--space-lg);
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
    background: var(--gray-50);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-surface-hover);
  }

  .dep-item.is-past { color: var(--gray-500); }
  .dep-item.is-past .dep-time { color: var(--gray-500); }
  .dep-item.is-past .line-badge { opacity: 0.35; }

  .dep-item.is-too-late { color: var(--gray-500); }
  .dep-item.is-too-late .dep-time { color: var(--gray-500); text-decoration: line-through; }
  .dep-item.is-too-late .line-badge { opacity: 0.2; }

  .dep-item.is-next {
    background: var(--transport-next-bg);
    border-color: var(--transport-next-border);
  }

  .dep-item.is-next .dep-time { color: var(--transport-next-text); font-weight: 700; }

  .dep-item.is-canceled {
    background: var(--color-canceled-bg);
    color: var(--color-accent);
  }

  .dep-item.is-canceled .dep-time-scheduled {
    text-decoration: line-through;
    color: var(--color-accent);
    opacity: 0.5;
  }

  .dep-time-col {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    min-width: 2.8rem;
  }

  .dep-time {
    font-size: var(--font-lg);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--color-text);
  }
  @media (max-width: 768px) { .dep-time { font-size: var(--font-base); } }

  .dep-time-scheduled {
    font-size: var(--font-xs);
    font-variant-numeric: tabular-nums;
    color: var(--gray-500);
    text-decoration: line-through;
    line-height: 1.2;
  }

  .dep-time-real {
    font-size: var(--font-sm);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--color-delay);
    line-height: 1.2;
  }

  .line-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-xs);
    font-weight: 700;
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-sm);
    min-width: 2.25rem;
    flex-shrink: 0;
    position: relative;
  }

  .line-badge.l-107 { background: var(--badge-107-bg); color: #fff; }
  .line-badge.l-NE2 { background: var(--color-ne2-bg); color: var(--color-ne2-text); }

  .rt-dot {
    position: absolute;
    bottom: -3px;
    right: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--gray-50);
  }

  .rt-dot.green { background: var(--color-ontime); }
  .rt-dot.red { background: var(--color-delay); }

  .dep-middle {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .dep-dest {
    font-size: var(--font-sm);
    color: var(--color-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dep-item.is-past .dep-dest { color: var(--gray-500); }
  .dep-item.is-too-late .dep-dest { color: var(--gray-500); }

  .cancel-badge {
    display: inline-flex;
    align-items: center;
    font-size: var(--font-xs);
    font-weight: 700;
    padding: 1px 0.35rem;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    width: fit-content;
    background: var(--color-accent);
    color: #fff;
  }

  .dep-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
    gap: 1px;
  }

  .dep-walk {
    font-size: var(--font-xs);
    color: var(--color-text-secondary);
    white-space: nowrap;
  }

  .dep-countdown {
    font-size: var(--font-xs);
    font-weight: 600;
    color: var(--color-text-secondary);
    white-space: nowrap;
  }

  .dep-item.is-past .dep-walk,
  .dep-item.is-too-late .dep-walk,
  .dep-item.is-past .dep-countdown { color: var(--gray-500); }

  .empty-state {
    text-align: center;
    padding: var(--space-xl) var(--space-lg);
    color: var(--color-text-secondary);
    font-size: var(--font-sm);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; scroll-behavior: auto !important; animation: none !important; }
  }
</style>
<style>
  /* Page-specific layout only. The command bar, dropdown, day-tab, and fade
     styles are shared: see shared.css PAGE CHROME. */
  .day-tab { flex: 1; min-width: 0; text-align: center; }

  /* margin-top mirrors the lineup h1's 21px/16px gap below the bar; as a
     margin on the sticky element it vanishes when stuck, same as the lineup */
  .sticky-top { top: 28px; z-index: 30; margin-top: 21px; }
  .route-title { display: flex; align-items: center; justify-content: space-between; gap: var(--space-md); font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; padding: var(--space-md) 0 var(--space-sm); border-bottom: 2px solid var(--color-text); }
  .live-indicator { color: var(--color-text); }

  @media (max-width: 768px) {
    body { padding: 0 var(--space-md) var(--space-xl); }
    .cmd-bar { margin-left: -12px; margin-right: -12px; }
    .sticky-top { top: var(--header-h); margin-top: var(--space-lg); }
    .route-title { font-size: var(--font-xl); padding: var(--space-sm) 0 6px; }
  }
</style>

<script>
  setDbgTag('transport');
  document.querySelector('.hamburger').innerHTML = ICON_HAMBURGER;
  document.querySelector('.chat-nav-icon').innerHTML = ICON_CHAT;
  function toggleMenu() {
    dbg('[NAV] toggleMenu');
    document.getElementById('cmd-dropdown').classList.toggle('open');
    document.getElementById('menu-overlay').classList.toggle('open');
  }
  function closeMenu() {
    dbg('[NAV] closeMenu');
    document.getElementById('cmd-dropdown').classList.remove('open');
    document.getElementById('menu-overlay').classList.remove('open');
  }
  // Same as the lineup: on mobile the whole header bar toggles the menu
  if (window.matchMedia('(max-width:768px)').matches) {
    document.getElementById('cmd-bar').addEventListener('click', function (e) {
      if (!e.target.closest('.hamburger') && !e.target.closest('.nav-icon')) toggleMenu();
    });
  }
  window.addEventListener('DOMContentLoaded', function () {
    var el = document.querySelector('.sticky-top');
    var top = parseFloat(getComputedStyle(el).top) || 0;
    var sentinel = document.createElement('div');
    sentinel.style.cssText = 'height:0;width:0;pointer-events:none;visibility:hidden;position:relative;top:-' + top + 'px';
    el.parentNode.insertBefore(sentinel, el);
    new IntersectionObserver(function (entries) {
      el.classList.toggle('stuck', entries[0].intersectionRatio === 0);
    }, { threshold: 0 }).observe(sentinel);
  });
</script>

<script>
var TIMETABLE_DATA = null;
</script>
<script>
(function () {
  "use strict";

  var data = null;
  var walkMinutes = null;
  var activeDay = 0;
  var realtimeCache = {};
  var realtimeActive = false;
  var POLL_INTERVAL = 60000;
  var API_BASE = "";

  var STOP_LAT = 51.486095;
  var STOP_LNG = 7.046062;
  var WALK_SPEED_KMH = 4.5;

  function parseDate(dateStr) {
    var p = dateStr.split(".");
    return { day: parseInt(p[0], 10), month: parseInt(p[1], 10), year: parseInt(p[2], 10) };
  }

  function depToMinutes(dep) {
    var p = dep.split(":");
    return parseInt(p[0], 10) * 60 + parseInt(p[1], 10);
  }

  function serviceDayMinutes(dep) {
    var m = depToMinutes(dep);
    return m < 240 ? m + 1440 : m;
  }

  function getNow() {
    var params = new URLSearchParams(window.location.search);
    var now;
    var pDate = params.get("date");
    var pTime = params.get("time");
    if (pDate && pTime) {
      var dp = pDate.split(".");
      var tp = pTime.split(":");
      now = new Date(parseInt(dp[2]), parseInt(dp[1]) - 1, parseInt(dp[0]), parseInt(tp[0]), parseInt(tp[1]));
    } else {
      now = new Date();
    }
    return {
      year: now.getFullYear(),
      month: now.getMonth() + 1,
      day: now.getDate(),
      hours: now.getHours(),
      minutes: now.getMinutes(),
      nowServiceMinutes: now.getHours() < 4
        ? now.getHours() * 60 + now.getMinutes() + 1440
        : now.getHours() * 60 + now.getMinutes()
    };
  }

  function findTodayIndex() {
    var now = getNow();
    for (var i = 0; i < data.days.length; i++) {
      var d = parseDate(data.days[i].date);
      if (d.day === now.day && d.month === now.month && d.year === now.year) return i;
      if (now.hours < 4) {
        var yesterday = new Date(now.year, now.month - 1, now.day - 1);
        if (d.day === yesterday.getDate() && d.month === yesterday.getMonth() + 1 && d.year === yesterday.getFullYear()) return i;
      }
    }
    return 0;
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function rtKey(line, scheduledTime, scheduledDate) {
    return line + "|" + scheduledTime + "|" + scheduledDate;
  }

  function fetchRealtime() {
    var dayData = data.days[activeDay];
    if (!dayData) return;

    var now = getNow();
    var pd = parseDate(dayData.date);

    var isToday = pd.day === now.day && pd.month === now.month && pd.year === now.year;
    if (now.hours < 4) {
      var yesterday = new Date(now.year, now.month - 1, now.day - 1);
      if (pd.day === yesterday.getDate() && pd.month === yesterday.getMonth() + 1 && pd.year === yesterday.getFullYear()) {
        isToday = true;
      }
    }
    if (!isToday) {
      realtimeActive = false;
      document.getElementById("live-indicator").classList.remove("active");
      return;
    }

    var timeStr = String(now.hours).padStart(2, "0") + String(now.minutes).padStart(2, "0");
    var dateStr = String(now.day).padStart(2, "0") + "." + String(now.month).padStart(2, "0") + "." + now.year;

    fetch(API_BASE + "/api/transport/departures?date=" + encodeURIComponent(dateStr) + "&time=" + timeStr + "&limit=30")
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (!result.departures) return;
        realtimeActive = true;
        document.getElementById("live-indicator").classList.add("active");

        var ts = new Date(result.ts);
        var dd = String(ts.getDate()).padStart(2, "0");
        var mm = String(ts.getMonth() + 1).padStart(2, "0");
        var yyyy = ts.getFullYear();
        var hh = String(ts.getHours()).padStart(2, "0");
        var mi = String(ts.getMinutes()).padStart(2, "0");
        document.getElementById("live-updated").textContent =
          "updated " + dd + "/" + mm + "/" + yyyy + " at " + hh + ":" + mi;

        for (var i = 0; i < result.departures.length; i++) {
          var rt = result.departures[i];
          var key = rtKey(rt.line, rt.scheduled, rt.scheduledDate);
          realtimeCache[key] = rt;
        }
        renderPanel();
      })
      .catch(function () {
        realtimeActive = false;
        document.getElementById("live-indicator").classList.remove("active");
      });
  }

  function renderTabs() {
    var tabs = document.getElementById("day-tabs");
    tabs.innerHTML = "";
    for (var i = 0; i < data.days.length; i++) {
      var d = data.days[i];
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "day-tab" + (i === activeDay ? " active" : "");
      btn.dataset.index = i;
      btn.innerHTML = '<span>' + d.day + '</span><span class="day-tab-count">' + d.date + '</span>';
      btn.addEventListener("click", onTabClick);
      tabs.appendChild(btn);
    }
  }

  function onTabClick(e) {
    var idx = parseInt(e.currentTarget.dataset.index, 10);
    activeDay = idx;
    renderTabs();
    renderPanel();
    fetchRealtime();
  }

  function renderPanel() {
    var panels = document.getElementById("day-panels");
    panels.innerHTML = "";

    var dayData = data.days[activeDay];
    if (!dayData || dayData.departures.length === 0) {
      panels.innerHTML = '<div class="empty-state">No departures available</div>';
      return;
    }

    var panel = document.createElement("div");
    panel.className = "day-panel";
    panel.setAttribute("aria-hidden", "false");
    panel.setAttribute("role", "tabpanel");

    var list = document.createElement("ul");
    list.className = "dep-list";

    var now = getNow();
    var parsedDate = parseDate(dayData.date);
    var isToday = parsedDate.day === now.day && parsedDate.month === now.month && parsedDate.year === now.year;
    if (now.hours < 4) {
      var yesterday = new Date(now.year, now.month - 1, now.day - 1);
      if (parsedDate.day === yesterday.getDate() && parsedDate.month === yesterday.getMonth() + 1 && parsedDate.year === yesterday.getFullYear()) {
        isToday = true;
      }
    }

    var nextFound = false;
    var scrollTarget = null;

    for (var i = 0; i < dayData.departures.length; i++) {
      var dep = dayData.departures[i];
      var svcMin = serviceDayMinutes(dep.dep);

      var rt = realtimeCache[rtKey(dep.line, dep.dep, dayData.date)];
      var isCanceled = rt && rt.status === "CANCELED";
      var hasDelay = rt && rt.delay > 0 && !isCanceled;
      var isOnTime = rt && rt.realtime && rt.delay === 0 && !isCanceled;

      var effectiveSvcMin = svcMin;
      if (rt && rt.real && !isCanceled) {
        effectiveSvcMin = serviceDayMinutes(rt.real);
      }

      var li = document.createElement("li");
      li.className = "dep-item";

      var isPast = false;
      var isTooLate = false;
      var isNext = false;

      if (isToday) {
        if (isCanceled) {
          isPast = true;
        } else if (effectiveSvcMin < now.nowServiceMinutes) {
          isPast = true;
        } else if (!nextFound) {
          if (walkMinutes !== null) {
            var leaveBy = effectiveSvcMin - walkMinutes;
            if (leaveBy < now.nowServiceMinutes) {
              isTooLate = true;
            } else {
              isNext = true;
              nextFound = true;
            }
          } else {
            isNext = true;
            nextFound = true;
          }
        }
      }

      if (isCanceled) li.classList.add("is-canceled");
      if (isPast) li.classList.add("is-past");
      if (isTooLate) li.classList.add("is-too-late");
      if (isNext) {
        li.classList.add("is-next");
        scrollTarget = li;
      }

      var timeCol = document.createElement("div");
      timeCol.className = "dep-time-col";

      if (hasDelay && rt.real) {
        var schedSpan = document.createElement("span");
        schedSpan.className = "dep-time-scheduled";
        schedSpan.textContent = dep.dep;
        var realSpan = document.createElement("span");
        realSpan.className = "dep-time-real";
        realSpan.textContent = rt.real;
        timeCol.appendChild(schedSpan);
        timeCol.appendChild(realSpan);
      } else {
        var timeEl = document.createElement("span");
        timeEl.className = "dep-time";
        timeEl.textContent = dep.dep;
        timeCol.appendChild(timeEl);
      }

      var badge = document.createElement("span");
      badge.className = "line-badge l-" + dep.line;
      badge.textContent = dep.line;

      if (rt && rt.realtime && !isCanceled) {
        var dot = document.createElement("span");
        dot.className = "rt-dot " + (hasDelay ? "red" : "green");
        badge.appendChild(dot);
      }

      var middle = document.createElement("div");
      middle.className = "dep-middle";

      var dest = document.createElement("span");
      dest.className = "dep-dest";
      dest.textContent = dep.direction.replace("Essen ", "");
      middle.appendChild(dest);

      if (isCanceled) {
        var cancelBadge = document.createElement("span");
        cancelBadge.className = "cancel-badge";
        cancelBadge.textContent = "Canceled";
        middle.appendChild(cancelBadge);
      }

      var right = document.createElement("div");
      right.className = "dep-right";

      if (rt && rt.countdown != null && isToday && !isPast && !isCanceled) {
        var cdEl = document.createElement("span");
        cdEl.className = "dep-countdown";
        cdEl.textContent = "arr. in " + rt.countdown + " min";
        right.appendChild(cdEl);
      } else if (walkMinutes !== null && !isPast && isToday) {
        var minsLeft = effectiveSvcMin - now.nowServiceMinutes;
        if (minsLeft > 0) {
          var walkEl = document.createElement("span");
          walkEl.className = "dep-walk";
          walkEl.textContent = minsLeft + " min";
          right.appendChild(walkEl);
        }
      }

      li.appendChild(timeCol);
      li.appendChild(badge);
      li.appendChild(middle);
      li.appendChild(right);
      list.appendChild(li);
    }

    panel.appendChild(list);
    panels.appendChild(panel);

    if (scrollTarget) {
      setTimeout(function () {
        scrollTarget.scrollIntoView({ block: "center", behavior: "smooth" });
      }, 100);
    }
  }

  function fetchWalkRoute(lat, lng) {
    var url = API_BASE + "/api/transport/walk?lat=" + lat + "&lng=" + lng;
    return fetch(url)
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d || d.distanceM == null) return null;
        return { distanceM: d.distanceM, durationS: d.durationS };
      })
      .catch(function () { return null; });
  }

  function fmtNum(n) {
    return n.toLocaleString("de-DE");
  }

  function fmtDist(meters) {
    if (meters < 1000) return fmtNum(Math.round(meters)) + " m";
    return fmtNum(parseFloat((meters / 1000).toFixed(1))) + " km";
  }

  function applyWalkData(distanceM, durationS) {
    walkMinutes = durationS ? Math.ceil(durationS / 60) : Math.ceil((distanceM / 1000) / WALK_SPEED_KMH * 60);
    var banner = document.getElementById("location-banner");
    banner.querySelector(".location-text").textContent =
      fmtDist(distanceM) + " / " + fmtNum(walkMinutes) + " min to stop";
    document.getElementById("locate-btn").textContent = "Update";
    renderPanel();
  }

  function updateLocation(lat, lng) {
    var banner = document.getElementById("location-banner");
    banner.querySelector(".location-text").textContent = "Calculating route...";

    fetchWalkRoute(lat, lng).then(function (result) {
      if (result) {
        applyWalkData(result.distanceM, result.durationS);
      } else {
        var dist = haversineKm(lat, lng, STOP_LAT, STOP_LNG);
        walkMinutes = Math.ceil((dist / WALK_SPEED_KMH) * 60);
        banner.querySelector(".location-text").textContent =
          "~" + fmtDist(dist * 1000) + " / ~" + fmtNum(walkMinutes) + " min";
        document.getElementById("locate-btn").textContent = "Update";
        renderPanel();
      }
    });
  }

  function onLocateClick() {
    if (!navigator.geolocation) {
      document.querySelector(".location-text").textContent = "Geolocation not supported";
      return;
    }

    var btn = document.getElementById("locate-btn");
    btn.textContent = "...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        btn.disabled = false;
        updateLocation(pos.coords.latitude, pos.coords.longitude);
      },
      function () {
        btn.disabled = false;
        btn.textContent = "Retry";
        document.querySelector(".location-text").textContent = "Location access denied";
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function loadData(d) {
    data = d;
    if (d.stop) {
      STOP_LAT = d.stop.lat;
      STOP_LNG = d.stop.lng;
    }
    activeDay = findTodayIndex();
    renderTabs();
    renderPanel();
    fetchRealtime();
  }

  function init() {
    if (typeof TIMETABLE_DATA !== "undefined" && TIMETABLE_DATA) {
      loadData(TIMETABLE_DATA);
    } else {
      fetch("/timetable-transport.json")
        .then(function (r) { return r.json(); })
        .then(loadData)
        .catch(function () {
          document.getElementById("day-panels").innerHTML =
            '<div class="empty-state">Could not load timetable data.</div>';
        });
    }

    document.getElementById("locate-btn").addEventListener("click", onLocateClick);

    setInterval(function () {
      if (data) {
        fetchRealtime();
      }
    }, POLL_INTERVAL);

    setInterval(function () {
      if (data && !realtimeActive) renderPanel();
    }, 30000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
