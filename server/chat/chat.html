<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
<style>
:root {
  /* Gray scale — WCAG AA/AAA compliant on white */
  --gray-900: #111827;  /* primary text — 18.1:1 AAA */
  --gray-700: #374151;  /* secondary text — 9.0:1 AAA */
  --gray-500: #6B7280;  /* muted/tertiary — 4.6:1 AA */
  --gray-400: #9CA3AF;  /* disabled — decorative only */
  --gray-200: #E5E7EB;  /* borders */
  --gray-100: #F3F4F6;  /* surface/hover */
  --gray-50:  #F9FAFB;  /* alt surface */

  /* Semantic aliases */
  --color-text: var(--gray-900);
  --color-text-secondary: var(--gray-700);
  --color-muted: var(--gray-500);
  --color-disabled: var(--gray-400);
  --color-border: var(--gray-200);
  --color-surface: var(--gray-100);
  --color-surface-hover: var(--gray-200);
  --color-bg: #fff;
  --color-accent: #B91C1C;
  --color-success: #047857;

  /* Font scale — base 15px */
  --font-xl: 20px;
  --font-lg: 17px;
  --font-base: 15px;
  --font-sm: 13px;
  --font-xs: 11px;
  --font-xxs: 10px;

  /* Spacing scale — 4px base */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-2xl: 32px;

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --radius-pill: 999px;

  /* 12 user colors: vivid (name) + pastel (bubble) */
  --user-1: #B91C1C; --user-1-bg: #FEE2E2;
  --user-2: #C2410C; --user-2-bg: #FFEDD5;
  --user-3: #B45309; --user-3-bg: #FEF9C3;
  --user-4: #4D7C0F; --user-4-bg: #ECFCCB;
  --user-5: #047857; --user-5-bg: #D1FAE5;
  --user-6: #0F766E; --user-6-bg: #CCFBF1;
  --user-7: #0369A1; --user-7-bg: #E0F2FE;
  --user-8: #1D4ED8; --user-8-bg: #DBEAFE;
  --user-9: #4338CA; --user-9-bg: #E0E7FF;
  --user-10: #7E22CE; --user-10-bg: #F3E8FF;
  --user-11: #A21CAF; --user-11-bg: #FAE8FF;
  --user-12: #BE185D; --user-12-bg: #FCE7F3;
  --user-self: #64748B; --user-self-bg: #E2E8F0;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.12);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.16);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: var(--color-text); background: var(--color-bg); font-size: var(--font-base); line-height: 1.5; }

/* --- Layout --- */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.header { display: flex; align-items: center; height: 48px; background: var(--gray-900); color: #fff; padding: 0 var(--space-lg); flex-shrink: 0; }
.header .back { background: none; border: none; color: #fff; font-size: var(--font-xl); cursor: pointer; padding: var(--space-sm); margin-right: var(--space-sm); line-height: 1; }
.header .title { flex: 1; font-weight: 600; font-size: var(--font-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .subtitle { font-size: var(--font-xs); color: var(--gray-400); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .online { font-size: var(--font-xxs); color: var(--gray-400); }
.header .header-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.header .header-info .title { font-size: var(--font-sm); line-height: 1.2; }
.header .header-info .online { display: block; line-height: 1.2; }
.header .header-avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; cursor: pointer; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.3); }
.header .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
.icon-user { vertical-align: -3px; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overflow-anchor: none; scrollbar-width: none; }
.content::-webkit-scrollbar { display: none; }

/* --- Tabs --- */
.tabs { display: flex; border-bottom: 1px solid var(--color-border); background: var(--color-bg); }
.tabs button { flex: 1; padding: var(--space-md); background: none; border: none; font-size: var(--font-sm); color: var(--color-muted); cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; }
.tabs button.active { color: var(--color-text); font-weight: 600; border-bottom-color: var(--color-text); }

/* --- Room list --- */
.room-list { list-style: none; margin: 0; padding: 0; }
.room-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--color-surface); cursor: pointer; }
.room-item:active { background: var(--color-surface); }
.room-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.room-dot.online { background: var(--color-success); }
.room-dot.offline { background: var(--gray-400); }
.room-info { flex: 1; min-width: 0; }
.room-name { font-weight: 600; font-size: var(--font-base); }
.room-preview { font-size: var(--font-xs); color: var(--color-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.room-meta { text-align: right; flex-shrink: 0; }
.room-count { font-size: var(--font-xs); color: var(--color-muted); margin-top: 2px; }

/* --- Avatar --- */
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: var(--font-sm); color: #fff; flex-shrink: 0; }
.avatar-sm { width: 28px; height: 28px; font-size: var(--font-xs); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; }

/* --- Messages --- */
.messages { padding: var(--space-lg) var(--space-md) var(--space-sm); display: flex; flex-direction: column; gap: 2px; min-height: 100%; justify-content: flex-end; }
.msg { display: flex; gap: var(--space-sm); padding: 2px 0 var(--space-md); align-items: flex-end; }
.msg.msg-mine { justify-content: flex-end; }
.msg-bubble { position: relative; padding: var(--space-md) var(--space-md) var(--space-xl); max-width: 75%; min-width: 80px; display: inline-block; word-break: break-word; }
.msg-mine-bubble { background: var(--user-7-bg); color: var(--color-text); border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg); }
.msg-other-bubble { background: var(--color-surface); color: var(--color-text); border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm); }
.msg-header { display: flex; gap: var(--space-sm); align-items: baseline; margin-bottom: 2px; }
.msg-name { font-weight: 600; font-size: var(--font-xs); cursor: pointer; }
.msg-time { position: absolute; bottom: var(--space-sm); right: var(--space-md); font-size: var(--font-xxs); color: var(--color-muted); }
.msg-text { font-size: var(--font-base); line-height: 1.5; }
.msg-image { max-width: 260px; max-height: 260px; border-radius: var(--radius-md); margin-top: var(--space-xs); display: block; }
.msg-video-wrap { position: relative; display: inline-block; margin-top: var(--space-xs); }
.msg-video { max-width: 260px; max-height: 260px; border-radius: var(--radius-md); display: block; }
.msg-video-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 48px; height: 48px; color: #fff; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5)); pointer-events: none; transition: opacity 0.15s; }
.msg-video-wrap.playing .msg-video-play { opacity: 0; }
.msg-video-fullscreen { position: absolute; bottom: var(--space-md); right: var(--space-md); width: 22px; height: 22px; color: #fff; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7)); opacity: 0; transition: opacity 0.15s; }
.msg-video-wrap.playing .msg-video-fullscreen { opacity: 0.8; }
.msg-pending { opacity: 0.5; }

/* --- Message cards (meetup + location) --- */
.msg-card { background: var(--color-surface); border-radius: var(--radius-md); padding: var(--space-md); margin-top: var(--space-xs); width: 260px; display: block; text-decoration: none; color: inherit; }
.msg-card:active { background: var(--color-surface-hover); }
.msg-card .card-label { font-size: var(--font-xs); color: var(--color-accent); font-weight: 700; margin-bottom: var(--space-xs); }
.msg-card .card-title { font-weight: 600; font-size: var(--font-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-card .card-meta { font-size: var(--font-xs); color: var(--color-muted); margin-top: var(--space-xs); }
.msg-card.card-meetup { background: var(--user-1-bg); box-shadow: inset 0 0 0 1px var(--color-accent); }
.msg-card.card-location { background: var(--user-5-bg); box-shadow: inset 0 0 0 1px var(--color-success); }
.msg-card.card-location .card-label { color: var(--color-success); }

/* --- Input bar --- */
.input-bar { display: flex; align-items: center; gap: var(--space-xs); padding: var(--space-sm) var(--space-md); border-top: 1px solid var(--color-border); background: var(--color-bg); flex-shrink: 0; position: relative; }
.input-bar button { background: none; border: none; padding: 0; cursor: pointer; color: var(--color-text-secondary); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.input-bar button svg { width: 24px; height: 24px; }
.input-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.input-wrap input { width: 100%; padding: var(--space-md) 44px var(--space-md) var(--space-lg); border: 1px solid var(--color-border); border-radius: var(--radius-pill); font-size: var(--font-base); outline: none; font-family: inherit; }
.input-wrap input:focus { border-color: var(--gray-400); }
.input-bar .emoji-btn { position: absolute; right: 10px; width: 22px; height: 22px; padding: 0; background: none; border: none; color: var(--color-disabled); display: flex; align-items: center; justify-content: center; }
.input-bar .emoji-btn svg { width: 22px; height: 22px; }
.input-bar .send { color: var(--color-text-secondary); }
.input-bar .send svg { width: 28px; height: 28px; }

/* --- Action menu popup --- */
.action-menu { display: none; position: absolute; bottom: 100%; left: var(--space-sm); margin-bottom: var(--space-xs); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); z-index: 50; overflow: hidden; }
.action-menu.open { display: flex; flex-direction: column; }
.action-menu button { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md) var(--space-xl); border: none; background: none; font-size: var(--font-sm); cursor: pointer; white-space: nowrap; text-align: left; font-family: inherit; width: 100%; height: auto; color: var(--color-text); justify-content: flex-start; }
.action-menu button:active { background: var(--color-surface); }
@media (hover: hover) { .action-menu button:hover { background: var(--color-surface); } }

/* --- Reply preview --- */
.reply-preview { display: none; align-items: center; gap: var(--space-sm); padding: var(--space-sm) var(--space-md); border-top: 1px solid var(--color-border); background: var(--color-surface); flex-shrink: 0; }
.reply-preview.visible { display: flex; }
.reply-preview-content { flex: 1; min-width: 0; border-left: 3px solid var(--color-accent); padding-left: var(--space-sm); }
.reply-preview-name { font-weight: 600; font-size: var(--font-xxs); display: block; margin-bottom: 2px; }
.reply-preview-text { font-size: 14px; line-height: 1.4; color: var(--color-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.reply-preview-close { background: none; border: none; font-size: 18px; color: var(--color-muted); cursor: pointer; padding: var(--space-xs) var(--space-sm); }

/* --- Reply quote in message --- */
.reply-quote { border-left: 3px solid var(--color-accent); padding: var(--space-xs) var(--space-sm); margin: 6px 0; cursor: pointer; background: rgba(0,0,0,0.04); border-radius: var(--radius-sm); }
.msg-mine-bubble .reply-quote { background: rgba(0,0,0,0.06); }
.reply-quote-name { font-weight: 600; font-size: var(--font-xxs); display: block; margin-bottom: 2px; }
.reply-quote-text { font-size: 14px; line-height: 1.4; color: var(--color-muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.msg.highlight { animation: msg-highlight 1.5s ease-out; }
@keyframes msg-highlight { 0% { background: rgba(185,28,28,0.1); } 100% { background: transparent; } }

/* --- Reactions --- */
.reaction-pills { position: absolute; bottom: -13px; display: flex; gap: 3px; z-index: 5; }
.msg-mine-bubble .reaction-pills { right: var(--space-sm); }
.msg-other-bubble .reaction-pills { left: var(--space-sm); }
.reaction-pill { display: inline-flex; align-items: center; justify-content: center; gap: 2px; padding: 3px var(--space-sm); border: 1px solid var(--color-border); border-radius: var(--radius-pill); background: var(--color-surface); font-size: var(--font-xs); cursor: pointer; box-shadow: var(--shadow-sm); line-height: 1; text-align: center; }
.reaction-pill.own { background: var(--user-1-bg); border-color: var(--color-accent); }
.react-btn { opacity: 0; position: absolute; top: 50%; transform: translateY(-50%); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; box-shadow: var(--shadow-sm); transition: opacity 0.15s; color: var(--color-text-secondary); }
.react-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.msg-bubble:hover .react-btn, .react-btn.active { opacity: 1; }
.msg-other-bubble .react-btn { left: auto; right: -38px; }
.msg-mine-bubble .react-btn { right: auto; left: -38px; }
.msg-bubble::after { content: ''; position: absolute; top: 0; bottom: 0; width: 88px; }
.msg-other-bubble::after { right: -88px; }
.msg-mine-bubble::after { left: -88px; }
.reaction-picker { display: flex; gap: 2px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-pill); padding: var(--space-xs) 6px; box-shadow: var(--shadow-md); position: fixed; z-index: 300; white-space: nowrap; }
.reaction-picker button { background: none; border: none; font-size: var(--font-xl); padding: var(--space-xs) 6px; cursor: pointer; border-radius: 50%; }
@media (hover: hover) { .reaction-picker button:hover { background: var(--color-surface); } }

/* --- Action sheet (mobile bottom drawer / desktop centered modal) --- */
.action-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.action-sheet-overlay.open { opacity: 1; }
.action-sheet { background: var(--color-bg); width: 100%; max-width: 360px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: var(--space-sm) 0; padding-bottom: env(safe-area-inset-bottom, var(--space-sm)); transform: translateY(100%); transition: transform 0.25s ease-out; }
.action-sheet-overlay.open .action-sheet { transform: translateY(0); }
.action-sheet-title { text-align: center; font-weight: 600; font-size: var(--font-sm); color: var(--color-muted); padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--color-border); }
.action-sheet-btn { display: block; width: 100%; padding: var(--space-md) var(--space-lg); border: none; background: none; font-size: var(--font-base); cursor: pointer; text-align: center; font-family: inherit; color: var(--color-text); }
.action-sheet-btn:active { background: var(--color-surface); }
.action-sheet-danger { color: var(--color-accent); }
.action-sheet-cancel { color: var(--color-muted); border-top: 1px solid var(--color-border); margin-top: var(--space-xs); }
@media (min-width: 768px) {
  .action-sheet-overlay { align-items: center; }
  .action-sheet { border-radius: var(--radius-lg); max-width: 360px; transform: scale(0.95); opacity: 0; padding-bottom: var(--space-sm); }
  .action-sheet-overlay.open .action-sheet { transform: scale(1); opacity: 1; }
}

/* --- Image/video viewer --- */
.image-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.image-viewer.open { opacity: 1; }
.image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: var(--radius-sm); }
.viewer-close { position: absolute; top: var(--space-md); right: var(--space-md); width: 32px; height: 32px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); opacity: 0.8; }

/* --- Video trim editor --- */
.trim-editor video { width: 100%; border-radius: 0; display: block; background: #000; }
.trim-controls { padding: var(--space-md) var(--space-lg); display: flex; flex-direction: column; gap: var(--space-sm); }
.trim-track { position: relative; height: 32px; background: var(--color-surface); border-radius: var(--radius-sm); cursor: pointer; }
.trim-range { position: absolute; top: 0; height: 100%; background: rgba(0,0,0,0.12); border-radius: var(--radius-sm); }
.trim-handle { position: absolute; top: 0; width: 12px; height: 100%; background: var(--color-text); border-radius: 3px; cursor: ew-resize; z-index: 2; }
.trim-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 2px; height: 12px; background: #fff; border-radius: 1px; }
.trim-playhead { position: absolute; top: 0; width: 2px; height: 100%; background: var(--color-accent); z-index: 1; pointer-events: none; }
.trim-times { display: flex; justify-content: space-between; font-size: var(--font-xs); color: var(--color-muted); }
.trim-duration { text-align: center; font-size: var(--font-sm); font-weight: 600; }

/* --- Modal --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; }
.modal { background: var(--color-bg); width: calc(100% - var(--space-2xl)); max-width: 400px; border-radius: var(--radius-lg); overflow: visible; transform: scale(0.95); transition: transform 0.2s; }
.modal-overlay.open .modal { transform: scale(1); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--color-border); }
.modal-title { font-weight: 600; font-size: var(--font-base); }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; padding: var(--space-xs) var(--space-sm); color: var(--color-muted); }
.modal-body { padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-sm); }
.modal-label { font-size: var(--font-xs); font-weight: 600; color: var(--color-muted); margin-top: var(--space-xs); }
.modal-input { padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-sm); outline: none; width: 100%; font-family: inherit; }
.modal-input:focus { border-color: var(--gray-400); }
.modal-textarea { padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-sm); outline: none; resize: vertical; width: 100%; font-family: inherit; }
.modal-footer { padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--color-border); }
.modal-btn-primary { width: 100%; padding: var(--space-md); background: var(--gray-900); color: #fff; border: none; border-radius: var(--radius-md); font-size: var(--font-base); cursor: pointer; font-weight: 600; font-family: inherit; }
.modal-btn-secondary { padding: var(--space-md); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-xs); cursor: pointer; white-space: nowrap; font-family: inherit; }

/* --- Auth screen --- */
.auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-lg); padding: var(--space-2xl); flex: 1; }
.auth-screen h2 { margin: 0 0 var(--space-sm); font-size: var(--font-xl); }
.auth-screen p { margin: 0; color: var(--color-muted); font-size: var(--font-sm); text-align: center; }
.auth-btn { display: flex; align-items: center; justify-content: center; gap: var(--space-md); width: 280px; padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); font-size: var(--font-base); cursor: pointer; font-family: inherit; }
.auth-btn:active { background: var(--color-surface); }
.auth-input { width: 280px; padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-base); outline: none; text-align: center; font-family: inherit; }
.auth-input:focus { border-color: var(--gray-400); }

/* --- Profile prompt --- */
.profile-prompt { display: flex; flex-direction: column; align-items: center; gap: var(--space-lg); padding: var(--space-2xl); flex: 1; justify-content: center; }
.profile-prompt h2 { margin: 0; font-size: var(--font-xl); }
.profile-field { width: 320px; position: relative; }
.profile-field input { width: 100%; padding: var(--space-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-base); text-align: center; outline: none; font-family: inherit; transition: border-color 0.15s; }
.profile-field input:focus { border-color: var(--gray-400); }
.profile-field input.valid, .profile-field input.valid:focus { border-color: var(--color-success); }
.profile-field .field-status { position: absolute; right: var(--space-md); top: 0; height: 46px; display: flex; align-items: center; font-size: var(--font-xs); }
.profile-field .field-status.ok { color: var(--color-success); }
.profile-field .field-status.err { color: var(--color-accent); }
.profile-field .field-hint { font-size: var(--font-xs); color: var(--color-muted); text-align: center; margin-top: var(--space-xs); min-height: 1.3em; text-wrap: balance; }

// --- Toast ---
function showToast(msg, duration) {
  dbg('[TOAST] showToast', msg);

    const words = msg.trim().split(/\s+/).length;

  const t = document.getElementById('toast');
  t.textContent = msg;

  _toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

  const res = await fetch(API + path, { credentials: 'include', ...opts });

    throw new Error(err.detail || res.statusText);
  }
  return res.json();

function onUsernameInput() {
  dbg('[PROFILE] onUsernameInput');
  clearTimeout(_usernameTimer);
  _usernameOk = false;
  const status = document.getElementById('username-status');
  const hint = document.getElementById('username-hint');
  const val = document.getElementById('username-input').value;
  if (!val || val.length < 2) {
    status.textContent = '';
    hint.textContent = 'Allowed: a-z 0-9 . _ -';
    hint.className = 'field-hint';
    updateProfilePreview();
    return;
  }
  status.textContent = '...';
  status.className = 'field-status';
  _usernameTimer = setTimeout(async () => {
    try {
      const r = await api('/auth/check-username?name=' + encodeURIComponent(val));
      if (document.getElementById('username-input').value !== val) return;
      _usernameOk = r.available;
      const inp = document.getElementById('username-input');
      inp.classList.toggle('valid', r.available);
      status.textContent = r.available ? 'ok' : '';
      status.className = 'field-status ' + (r.available ? 'ok' : 'err');
      hint.textContent = r.available ? 'Available' : r.reason;
      hint.className = 'field-hint' + (r.available ? '' : ' err');
    } catch { status.textContent = ''; }
    updateProfilePreview();
  }, 400);
}

  const hint = document.getElementById('displayname-hint');
  if (!val) {
    status.textContent = '';
    hint.textContent = 'Shown in chat instead of username';
    hint.className = 'field-hint';
    return;

  if (val.length < 2) { status.textContent = ''; hint.textContent = 'At least 2 characters'; hint.className = 'field-hint err'; return; }
  status.textContent = '...';
  status.className = 'field-status';
  _displaynameTimer = setTimeout(async () => {
    try {
      const r = await api('/auth/check-displayname?name=' + encodeURIComponent(val));
      if (document.getElementById('displayname-input').value.trim() !== val) return;

function openCountryPicker() {
  dbg('[PROFILE] openCountryPicker');
  const picker = document.getElementById('country-picker');
  if (picker.classList.contains('open')) return;
  picker.classList.add('open');
  const input = document.getElementById('country-input');
  input.readOnly = false;
  input.value = '';
  input.placeholder = 'Search country...';
  input.focus();
  let _hlIdx = 0;
  renderCountryList('', 0);
  input.oninput = () => { _hlIdx = 0; renderCountryList(input.value, _hlIdx); };
  input.onkeydown = (e) => {
    if (e.key === 'Escape') { closeCountryPicker(); return; }
    const items = document.querySelectorAll('.country-item[data-code]');
    if (e.key === 'ArrowDown') { e.preventDefault(); _hlIdx = Math.min(_hlIdx + 1, items.length - 1); highlightCountryItem(items, _hlIdx); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); _hlIdx = Math.max(_hlIdx - 1, 0); highlightCountryItem(items, _hlIdx); }
    else if (e.key === 'Enter') { e.preventDefault(); if (items[_hlIdx]) items[_hlIdx].click(); }
  };
  setTimeout(() => document.addEventListener('click', _countryOutsideClick), 10);
}

function _countryOutsideClick(e) {
  if (!e.target.closest('#country-picker')) closeCountryPicker();
}

function closeCountryPicker() {
  dbg('[PROFILE] closeCountryPicker');
  const picker = document.getElementById('country-picker');
  if (!picker) return;
  picker.classList.remove('open');
  const input = document.getElementById('country-input');
  input.readOnly = true;
  input.placeholder = 'Select country';
  input.oninput = null;
  input.onkeydown = null;
  if (_selectedCountry) {
    const name = COUNTRIES.find(c => c[0] === _selectedCountry)?.[1] || '';
    input.value = FLAG(_selectedCountry) + ' ' + name;
  } else {
    input.value = '';
  }
  document.removeEventListener('click', _countryOutsideClick);
}

function renderCountryList(query, hlIdx) {
  const list = document.getElementById('country-list');
  if (!list) return;
  const q = query.toLowerCase();
  const matchStart = (haystack, needle) => haystack.toLowerCase().startsWith(needle) || haystack.split(/[\s-]+/).some(w => w.toLowerCase().startsWith(needle));
  const filtered = COUNTRIES.filter(([code, name, alt]) => matchStart(name, q) || code.toLowerCase().startsWith(q) || (alt && alt.split(/\s+/).some(w => w.toLowerCase().startsWith(q))));
  list.innerHTML = filtered.map(([code, name], i) =>
    `<div class="country-item${i === (hlIdx || 0) ? ' highlighted' : ''}" data-code="${code}" onclick="selectCountry('${code}')"><span class="flag">${FLAG(code)}</span>${escapeHtml(name)}</div>`
  ).join('') || '<div class="country-item" style="color:var(--color-muted)">No results</div>';
}

function highlightCountryItem(items, idx) {
  items.forEach((el, i) => el.classList.toggle('highlighted', i === idx));
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
}

let _avatarState = null;

function uploadAvatar() {
  dbg('[AVATAR] uploadAvatar');
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const bmp = await createImageBitmap(file);
    if (bmp.width < 128 || bmp.height < 128) { bmp.close(); showToast('Image must be at least 128x128'); return; }
    bmp.close();
    initAvatarEditor(file);
  };
  input.click();
}

async function initAvatarEditor(file) {
  dbg('[AVATAR] initAvatarEditor', file.name, file.size);
  const bmp = await createImageBitmap(file);
  const origW = bmp.width, origH = bmp.height;
  bmp.close();

  let previewFile = file;
  let natW = origW, natH = origH;
  const maxPreview = 2000;
  if (origW > maxPreview || origH > maxPreview) {
    const scale = maxPreview / Math.max(origW, origH);
    natW = Math.round(origW * scale);
    natH = Math.round(origH * scale);
    const resized = await createImageBitmap(file, { resizeWidth: natW, resizeHeight: natH, resizeQuality: 'high' });
    const canvas = new OffscreenCanvas(natW, natH);
    canvas.getContext('bitmaprenderer').transferFromImageBitmap(resized);
    const blob = await canvas.convertToBlob({ type: 'image/webp', quality: 0.8 });
    previewFile = new File([blob], 'preview.webp', { type: 'image/webp' });
  }

  const previewScale = origW / natW;
  const minScale = 128 / Math.min(natW, natH);
  const maxScale = Math.max(minScale * 6, 1);
  const initScale = minScale * 2;
  _avatarState = { file, previewFile, natW, natH, origW, origH, previewScale, scale: initScale, minScale, maxScale, x: 0, y: 0 };
  _avatarState.x = -(natW * initScale - 128) / 2;
  _avatarState.y = -(natH * initScale - 128) / 2;

  const url = URL.createObjectURL(previewFile);
  const el = document.getElementById('avatar-upload');
  el.innerHTML = `
    <div class="avatar-edit" id="avatar-edit">
      <img src="${url}" id="avatar-edit-img">
    </div>`;
  let _avatarDragged = false;
  el.onclick = () => { if (!_avatarDragged) uploadAvatar(); };

  const thumb = document.getElementById('avatar-zoom-thumb');
  const track = document.getElementById('avatar-zoom-track');
  thumb.classList.remove('hidden');
  const initT = (initScale - minScale) / (maxScale - minScale);
  thumb.style.left = (initT * 86) + 'px';

  let zLastX, zCurrentLeft;
  const zMove = (e) => {
    e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    zCurrentLeft += (cx - zLastX) * 0.4;
    zLastX = cx;
    const newLeft = Math.max(0, Math.min(86, zCurrentLeft));
    thumb.style.left = newLeft + 'px';
    const t = newLeft / 86;
    const s = _avatarState;
    const oldScale = s.scale;
    s.scale = s.minScale + t * (s.maxScale - s.minScale);
    const ratio = s.scale / oldScale;
    s.x = clampAvatarX(64 - (64 - s.x) * ratio);
    s.y = clampAvatarY(64 - (64 - s.y) * ratio);
    updateAvatarView();
  };
  const zUp = () => { document.removeEventListener('mousemove', zMove); document.removeEventListener('mouseup', zUp); document.removeEventListener('touchmove', zMove); document.removeEventListener('touchend', zUp); };
  thumb.onmousedown = (e) => { e.preventDefault(); zLastX = e.clientX; zCurrentLeft = parseFloat(thumb.style.left); document.addEventListener('mousemove', zMove); document.addEventListener('mouseup', zUp); };
  thumb.ontouchstart = (e) => { e.preventDefault(); zLastX = e.touches[0].clientX; zCurrentLeft = parseFloat(thumb.style.left); document.addEventListener('touchmove', zMove, { passive: false }); document.addEventListener('touchend', zUp); };

  updateAvatarView();

  const edit = document.getElementById('avatar-edit');
  let startX, startY, origX, origY;
  const onMove = (e) => {
    e.preventDefault();
    _avatarDragged = true;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const s = _avatarState;
    s.x = clampAvatarX(origX + (cx - startX));
    s.y = clampAvatarY(origY + (cy - startY));
    updateAvatarView();
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); setTimeout(() => { _avatarDragged = false; }, 10); };
  edit.onmousedown = (e) => { e.preventDefault(); _avatarDragged = false; startX = e.clientX; startY = e.clientY; origX = _avatarState.x; origY = _avatarState.y; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); };
  edit.ontouchstart = (e) => { e.preventDefault(); _avatarDragged = false; startX = e.touches[0].clientX; startY = e.touches[0].clientY; origX = _avatarState.x; origY = _avatarState.y; document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onUp); };
}

function clampAvatarX(x) { const s = _avatarState; return Math.min(0, Math.max(x, 128 - s.natW * s.scale)); }
function clampAvatarY(y) { const s = _avatarState; return Math.min(0, Math.max(y, 128 - s.natH * s.scale)); }

let _avatarPreviewTimer = null;

function updateAvatarView() {
  const img = document.getElementById('avatar-edit-img');
  if (!img || !_avatarState) return;
  const s = _avatarState;
  img.style.width = (s.natW * s.scale) + 'px';
  img.style.height = (s.natH * s.scale) + 'px';
  img.style.transform = `translate3d(${s.x}px, ${s.y}px, 0)`;
  clearTimeout(_avatarPreviewTimer);
  _avatarPreviewTimer = setTimeout(updateAvatarPreview, 400);
}

async function updateAvatarPreview() {
  dbg('[AVATAR] updateAvatarPreview');
  const s = _avatarState;
  if (!s) return;
  const cropX = -s.x / s.scale;
  const cropY = -s.y / s.scale;
  const cropSize = 128 / s.scale;
  try {
    const bmp = await createImageBitmap(s.previewFile, cropX, cropY, cropSize, cropSize, { resizeWidth: 128, resizeHeight: 128, resizeQuality: 'high' });
    const canvas = new OffscreenCanvas(128, 128);
    canvas.getContext('bitmaprenderer').transferFromImageBitmap(bmp);
    const blob = await canvas.convertToBlob({ type: 'image/webp', quality: 0.8 });
    if (_previewAvatarUrl) URL.revokeObjectURL(_previewAvatarUrl);
    _previewAvatarUrl = URL.createObjectURL(blob);
    updateProfilePreview();
  } catch {}
}

async function submitAvatarCrop() {
  dbg('[AVATAR] submitAvatarCrop');
  const s = _avatarState;
  if (!s) return null;
  const cropX = (-s.x / s.scale) * s.previewScale;
  const cropY = (-s.y / s.scale) * s.previewScale;
  const cropSize = (128 / s.scale) * s.previewScale;

  const bmp = await createImageBitmap(s.file, cropX, cropY, cropSize, cropSize, { resizeWidth: 128, resizeHeight: 128, resizeQuality: 'high' });
  const canvas = new OffscreenCanvas(128, 128);
  canvas.getContext('bitmaprenderer').transferFromImageBitmap(bmp);
  const blob = await canvas.convertToBlob({ type: 'image/webp', quality: 0.8 });

  const form = new FormData();
  form.append('file', new File([blob], 'avatar.webp', { type: 'image/webp' }));
  const resp = await fetch(API + '/upload/avatar', { method: 'POST', body: form, credentials: 'include' });
  if (!resp.ok) throw new Error('Upload failed');
  const result = await resp.json();
  _profileAvatarUrl = result.url;
  dbg('[PROFILE] avatar uploaded:', result.url);
  return result.url;
}

async function submitProfile() {
  dbg('[PROFILE] submitProfile');
  const username = document.getElementById('username-input').value.trim();
  const displayName = document.getElementById('displayname-input').value.trim();
  const country = _selectedCountry;

// --- WebSocket ---
let _wsConnecting = false;
function connectWS() {
  dbg('[WS] connectWS');
  return new Promise((resolve) => {
    if (_wsConnecting) { resolve(); return; }
    _wsConnecting = true;
    if (ws) { try { ws.onclose = null; ws.close(); } catch {} }
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('chat_session='));
    if (!token) { _wsConnecting = false; resolve(); return; }
    const sock = new WebSocket(`${proto}://${location.host}/ws/chat/${token.split('=')[1]}`);
    const done = () => { _wsConnecting = false; resolve(); };
    sock.onopen = () => { ws = sock; done(); };
    sock.onmessage = (e) => { try { handleWSEvent(JSON.parse(e.data)); } catch {} };
    sock.onclose = () => { ws = null; _wsConnecting = false; setTimeout(() => connectWS(), 3000); };
    sock.onerror = () => { done(); };
    setTimeout(done, 3000);
  });
}

function wsSend(event, payload) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ event, ...payload }));
}

function handleWSEvent(data) {
  dbg('ws event:', data.event, data.room_id || data.message_id || '');
  switch (data.event) {
    case 'room_history':
      messagesByRoom[data.room_id] = data.messages;
      onlineByRoom[data.room_id] = data.online;
      if (currentUser && !data.online.find(u => u.user_id === currentUser.id))
        onlineByRoom[data.room_id].push({ user_id: currentUser.id });
      verify('room_history', data.messages, data.messages.length + ' messages for ' + data.room_id);
      dbg('[CHAT] room_history received, room=' + data.room_id + ' currentRoom=' + currentRoom + ' msgs=' + data.messages.length);
      if (currentRoom === data.room_id) { renderMessages(); scrollToBottom(); updateHeaderCount(); }
      if (window._roomHistoryResolve) { window._roomHistoryResolve(); window._roomHistoryResolve = null; }
      updateSidebarCount(data.room_id);
      break;
    case 'message':
      if (!messagesByRoom[data.room_id]) messagesByRoom[data.room_id] = [];
      messagesByRoom[data.room_id].push(data);
      if (currentRoom === data.room_id) { appendMessage(data); scrollToBottom(); }
      break;
    case 'message_acked': {
      const msgs = messagesByRoom[currentRoom] || [];
      const idx = msgs.findIndex(m => m.temp_id === data.temp_id);
      if (idx !== -1) {
        msgs[idx].id = data.id;
        msgs[idx].created_at = data.created_at;
        msgs[idx].pending = false;
        const el = document.querySelector(`[data-msg-id="${data.temp_id}"]`);
        if (el) { el.setAttribute('data-msg-id', data.id); el.classList.remove('msg-pending'); }
        verify('message_acked', el, 'pending→confirmed temp_id=' + data.temp_id + ' → id=' + data.id);
      } else {
        verify('message_acked', false, 'temp_id not found: ' + data.temp_id);
      }
      break;
    }
    case 'message_removed': {
      const msgs2 = messagesByRoom[data.room_id] || [];
      const idx2 = msgs2.findIndex(m => m.id === data.id);
      if (idx2 !== -1) msgs2.splice(idx2, 1);
      const removedEl = document.querySelector(`[data-msg-id="${data.id}"]`);
      removedEl?.remove();
      verify('message_removed', !document.querySelector(`[data-msg-id="${data.id}"]`), 'message removed from DOM id=' + data.id);
      showToast(data.reason || 'Message removed');
      break;
    }
    case 'messages_expired':
      if (messagesByRoom[data.room_id]) {
        const ids = new Set(data.message_ids);
        messagesByRoom[data.room_id] = messagesByRoom[data.room_id].filter(m => !ids.has(m.id));
        if (currentRoom === data.room_id) renderMessages();
      }
      break;
    case 'typing':
      if (!typingUsers[data.room_id]) typingUsers[data.room_id] = {};
      if (data.active) typingUsers[data.room_id][data.user_id] = true;
      else delete typingUsers[data.room_id][data.user_id];
      if (currentRoom === data.room_id) updateTypingIndicator();
      break;
    case 'presence':
      if (!onlineByRoom[data.room_id]) onlineByRoom[data.room_id] = [];
      if (data.online) {
        if (!onlineByRoom[data.room_id].find(u => u.user_id === data.user_id))
          onlineByRoom[data.room_id].push({ user_id: data.user_id });
      } else {
        onlineByRoom[data.room_id] = onlineByRoom[data.room_id].filter(u => u.user_id !== data.user_id);
      }
      updateSidebarCount(data.room_id);
      if (data.room_id === currentRoom) updateHeaderCount();
      break;
    case 'message_rejected': showToast(data.reason); break;
    case 'strike': showToast(`Warning (${data.count}/3): ${data.reason}`); break;
    case 'banned': showToast('You have been banned: ' + data.reason); currentUser = null; renderAuth(); break;
    case 'dm_opened': navigateTo('room/' + data.room_id); break;
    case 'report_confirmed': showToast('Report submitted'); break;
    case 'reaction_updated': {
      const msgs3 = messagesByRoom[currentRoom] || [];
      const target = msgs3.find(m => m.id === data.message_id);
      if (target) target.reactions = data.reactions;
      updateReactionPills(data.message_id, data.reactions);
      break;
    }
  }
}

async function openRoom(roomId, roomName, roomType) {
  dbg('openRoom:', roomId, roomName, roomType);
  if (currentRoom && currentRoom !== roomId) {
    wsSend('leave_room', { room_id: currentRoom });
  }
  currentRoom = roomId;
  currentRoomName = roomName;
  currentRoomType = roomType || 'stage';
  if (!isMobile && !document.querySelector('.main-panel')) {
    dbg('openRoom: creating desktop layout first');
    renderRoomList();
  }
  renderChatView(roomName);
  location.hash = 'chat/room/' + roomId;
  const historyReady = new Promise(r => { window._roomHistoryResolve = r; setTimeout(r, 3000); });
  if (ws && ws.readyState === 1) {
    wsSend('join_room', { room_id: roomId });
  } else {
    try {
      const msgs = await api('/rooms/' + roomId + '/messages');
      messagesByRoom[roomId] = msgs;
      renderMessages();
      scrollToBottom();
    } catch (e) { dbg('[CHAT] openRoom REST error:', e); }
    await connectWS();
    if (ws && ws.readyState === 1) wsSend('join_room', { room_id: roomId });
  }
  await historyReady;
  verify('openRoom', currentRoom === roomId, 'currentRoom set to ' + roomId);
  verify('openRoom', document.getElementById('msg-input'), 'message input exists');
  verify('openRoom', document.getElementById('messages'), 'messages container exists');
}

function renderMessages() {
  dbg('[CHAT] renderMessages');
  const el = document.getElementById('messages');
  if (!el) { verify('renderMessages', false, '#messages not found'); return; }
  const msgs = messagesByRoom[currentRoom] || [];
  el.innerHTML = msgs.map(m => renderMessage(m)).join('');
  const rendered = el.querySelectorAll('.msg').length;
  verify('renderMessages', rendered === msgs.length, rendered + '/' + msgs.length + ' messages rendered');
}

function appendMessage(m) {
  dbg('[CHAT] appendMessage', m.type, m.id);
  const el = document.getElementById('messages');
  if (!el) return;
  el.insertAdjacentHTML('beforeend', renderMessage(m));
  if (m.type === 'image') {
    const img = el.querySelector(`[data-msg-id="${m.id}"] .msg-image`);
    if (img) img.onload = () => scrollToBottom();
  }
}

function renderMessage(m) {
  const isMe = m.user_id === currentUser?.id;
  const name = m.display_name || m.username || 'Unknown';
  const uid = m.user_id || '';
  const pendingCls = m.pending ? ' msg-pending' : '';

  let contentHtml = '';
  try {
    const c = JSON.parse(m.content);
    if (m.type === 'text') {
      contentHtml = `<div class="msg-text">${escapeHtml(c.text || '')}</div>`;
    } else if (m.type === 'image') {
      contentHtml = `<img class="msg-image" src="${c.url}" loading="lazy" onclick="event.stopPropagation();openImageViewer('${c.url}')">`;
    } else if (m.type === 'video') {
      contentHtml = `<div class="msg-video-wrap" onclick="event.stopPropagation();toggleVideo(this)" ondblclick="event.stopPropagation()">
        <video class="msg-video" src="${c.url}" playsinline preload="metadata"></video>
        <svg class="msg-video-play" viewBox="0 0 24 24" fill="none"><path d="M20.4086 9.35258C22.5305 10.5065 22.5305 13.4935 20.4086 14.6474L7.59662 21.6145C5.53435 22.736 3 21.2763 3 18.9671L3 5.0329C3 2.72368 5.53435 1.26402 7.59661 2.38548L20.4086 9.35258Z" fill="currentColor"/></svg>
        <svg class="msg-video-fullscreen" viewBox="0 0 24 24" fill="none" onclick="event.stopPropagation();expandVideo(this.closest('.msg-video-wrap'),'${c.url}')"><path d="M22 14C22 17.7712 22 19.6569 20.8284 20.8284C19.6569 22 17.7712 22 14 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 22C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 2C6.22876 2 4.34315 2 3.17157 3.17157C2 4.34315 2 6.22876 2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 2C17.7712 2 19.6569 2 20.8284 3.17157C22 4.34315 22 6.22876 22 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>`;
    } else if (m.type === 'location') {
      const label = c.label || 'Shared location';
      contentHtml = `<a class="msg-card card-location" href="https://maps.google.com/?q=${c.lat},${c.lng}" target="_blank" rel="noopener" style="display:flex;gap:10px;align-items:center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;color:#2a9d8f"><path d="M4 10.1433C4 5.64588 7.58172 2 12 2C16.4183 2 20 5.64588 20 10.1433C20 14.6055 17.4467 19.8124 13.4629 21.6744C12.5343 22.1085 11.4657 22.1085 10.5371 21.6744C6.55332 19.8124 4 14.6055 4 10.1433Z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
        <div><div class="card-label">MY LOCATION</div><div class="card-title">${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</div></div>
      </a>`;
    } else if (m.type === 'meetup_invite') {
      contentHtml = `<div class="msg-card card-meetup" onclick="openRoom('${c.meetup_id}','${escapeHtml(c.title)}','meetup')" style="cursor:pointer;display:flex;gap:10px;align-items:center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;color:var(--color-accent)"><path d="M2 12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12V14C22 17.7712 22 19.6569 20.8284 20.8284C19.6569 22 17.7712 22 14 22H10C6.22876 22 4.34315 22 3.17157 20.8284C2 19.6569 2 17.7712 2 14V12Z" stroke="currentColor" stroke-width="1.5"/><path d="M7 4V2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 4V2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="16.5" cy="16.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 9H21.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <div style="min-width:0"><div class="card-label">MEETUP</div><div class="card-title">${escapeHtml(c.title)}</div><div class="card-meta">${fmtTime(c.meetup_time)}</div></div>
      </div>`;
    }
  } catch {
    contentHtml = `<div class="msg-text">${escapeHtml(m.content)}</div>`;
  }

  let replyHtml = '';
  if (m.reply_to) {
    replyHtml = `<div class="reply-quote" onclick="scrollToMessage('${m.reply_to.id}')">
      <span class="reply-quote-name">${escapeHtml(m.reply_to.display_name || '')}</span>
      <span class="reply-quote-text">${escapeHtml((m.reply_to.text || '').slice(0, 60))}</span>
    </div>`;
  }

  const reactionsHtml = renderReactionPills(m.id, m.reactions);
  const reactBtn = `<button class="react-btn" onmouseenter="reactHoverIn('${m.id}',this)" onmouseleave="reactHoverOut()" onclick="event.stopPropagation()" ondblclick="event.stopPropagation()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M9 16C9.85038 16.6303 10.8846 17 12 17C13.1154 17 14.1496 16.6303 15 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16 10.5C16 11.3284 15.5523 12 15 12C14.4477 12 14 11.3284 14 10.5C14 9.67157 14.4477 9 15 9C15.5523 9 16 9.67157 16 10.5Z" fill="currentColor"/><ellipse cx="9" cy="10.5" rx="1" ry="1.5" fill="currentColor"/></svg></button>`;

  const time = `<span class="msg-time">${fmtTime(m.created_at)}</span>`;

  const color = msgColor(m);

  if (isMe) {
    return `<div class="msg msg-mine${pendingCls}" data-msg-id="${m.id}" ontouchstart="msgTouchStart('${m.id}',event)" ontouchmove="msgTouchMove(event)" ontouchend="msgTouchEnd()" ondblclick="msgDblClick('${m.id}')">
      <div class="msg-bubble msg-mine-bubble" style="background:${color.pastel}" oncontextmenu="event.preventDefault();showMsgMenu(this.closest('.msg').getAttribute('data-msg-id'),true)">
        ${reactBtn}
        ${replyHtml}${contentHtml}
        ${time}${reactionsHtml}
      </div>
    </div>`;
  }

  return `<div class="msg msg-other${pendingCls}" data-msg-id="${m.id}" ontouchstart="msgTouchStart('${m.id}',event)" ontouchmove="msgTouchMove(event)" ontouchend="msgTouchEnd()" ondblclick="msgDblClick('${m.id}')">
    ${avatarHtml(name, m.color_index, true, m.avatar_url)}
    <div class="msg-bubble msg-other-bubble" style="background:${color.pastel}" oncontextmenu="event.preventDefault();showMsgMenu(this.closest('.msg').getAttribute('data-msg-id'),false)">
      ${reactBtn}
      <div class="msg-header">
        <span class="msg-name" style="color:${color.vivid}" onclick="event.stopPropagation();showUserMenu('${uid}','${escapeHtml(name)}')">${escapeHtml(name)}</span>
      </div>
      ${replyHtml}${contentHtml}
      ${time}${reactionsHtml}
    </div>
  </div>`;
}

function renderReactionPills(msgId, reactions) {
  if (!reactions || !reactions.length) return '';
  return `<div class="reaction-pills">${reactions.map(r => {
    const emoji = REACTION_KEYS.find(([e, k]) => k === r.emoji);
    const display = emoji ? emoji[0] : r.emoji;
    const isOwn = (r.user_ids || []).includes(currentUser?.id);
    const countHtml = r.count > 1 ? `<span style="font-size:10px;min-width:10px;text-align:center;display:inline-block">${r.count}</span>` : '';
    return `<button class="reaction-pill${isOwn ? ' own' : ''}" onclick="event.stopPropagation();toggleReaction('${msgId}','${r.emoji}')">${display}${countHtml}</button>`;
  }).join('')}</div>`;
}

function updateReactionPills(msgId, reactions) {
  const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (!msgEl) return;
  let pillsEl = msgEl.querySelector('.reaction-pills');
  const html = renderReactionPills(msgId, reactions);
  if (html) {
    if (pillsEl) pillsEl.outerHTML = html;
    else msgEl.querySelector('.msg-bubble')?.insertAdjacentHTML('beforeend', html);
  } else if (pillsEl) pillsEl.remove();
}

let _scrollLock = null;
function scrollToBottom() {
  dbg('[SCROLL] scrollToBottom');
  const el = document.getElementById('msg-scroll');
  if (!el) return;
  el.scrollTop = el.scrollHeight;
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
  if (_scrollLock) _scrollLock.disconnect();
  const observer = new ResizeObserver(() => { el.scrollTop = el.scrollHeight; });
  observer.observe(document.getElementById('messages'));
  _scrollLock = observer;
  setTimeout(() => { observer.disconnect(); _scrollLock = null; }, 1500);
}

function updateTypingIndicator() {
  dbg('[CHAT] updateTypingIndicator');
  const el = document.getElementById('typing');
  if (!el) return;
  const users = Object.keys(typingUsers[currentRoom] || {}).filter(id => id !== currentUser?.id);
  el.textContent = users.length ? 'Someone is typing...' : '';
}

function scrollToMessage(msgId) {
  dbg('[CHAT] scrollToMessage', msgId);
  const el = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 1500); }
}

// --- Message interactions ---
let _longPressTimer = null;
let _swipeStartX = 0;
let _swipeStartY = 0;
let _swipeMsgId = null;
let _swipeMsgEl = null;
let _longPressTriggered = false;

function msgTouchStart(msgId, e) {
  _longPressTriggered = false;
  _swipeMsgId = msgId;
  _swipeMsgEl = e.currentTarget;
  const touch = e.touches[0];
  _swipeStartX = touch.clientX;
  _swipeStartY = touch.clientY;
  _longPressTimer = setTimeout(() => {
    _longPressTriggered = true;
    const msgs = messagesByRoom[currentRoom] || [];
    const m = msgs.find(msg => msg.id === msgId);
    showMsgMenu(msgId, m && m.user_id === currentUser?.id);
  }, 500);
}

function msgTouchMove(e) {
  if (!_swipeMsgEl) return;
  const touch = e.touches[0];
  const dx = touch.clientX - _swipeStartX;
  const dy = Math.abs(touch.clientY - _swipeStartY);
  if (dy > 30) { clearTimeout(_longPressTimer); _swipeMsgEl.style.transform = ''; return; }
  if (Math.abs(dx) > 10) clearTimeout(_longPressTimer);
  const isMe = _swipeMsgEl.classList.contains('msg-mine');
  const swipeDir = isMe ? -1 : 1;
  const offset = Math.max(0, dx * swipeDir);
  const clamped = Math.min(offset, 60);
  if (clamped > 0) {
    _swipeMsgEl.style.transform = `translateX(${clamped * swipeDir * -1}px)`;
    _swipeMsgEl.style.transition = 'none';
  }
}

function msgTouchEnd() {
  clearTimeout(_longPressTimer);
  if (_swipeMsgEl) {
    const transform = _swipeMsgEl.style.transform;
    const match = transform.match(/translateX\((-?\d+)px\)/);
    const offset = match ? Math.abs(parseInt(match[1])) : 0;
    _swipeMsgEl.style.transition = 'transform 0.2s';
    _swipeMsgEl.style.transform = '';
    if (offset >= 40 && !_longPressTriggered) {
      replyToMsg(_swipeMsgId);
    }
  }
  _swipeMsgEl = null;
  _swipeMsgId = null;
}

function msgDblClick(msgId) {
  replyToMsg(msgId);
}

function replyToMsg(msgId) {
  const msgs = messagesByRoom[currentRoom] || [];
  const m = msgs.find(msg => msg.id === msgId);
  if (!m) return;
  let text = '';
  try { text = JSON.parse(m.content).text || ''; } catch { text = m.content; }
  setReply(msgId, m.display_name || 'Unknown', text);
  dbg('replyToMsg:', msgId);
}

// --- Reply ---
function setReply(msgId, name, text) {
  dbg('[REPLY] setReply', msgId, name);
  replyTo = { id: msgId, display_name: name, text: text };
  const preview = document.getElementById('reply-preview');
  if (preview) {
    document.getElementById('reply-name').textContent = name;
    document.getElementById('reply-text').textContent = text.slice(0, 60);
    preview.classList.add('visible');
  }
  document.getElementById('msg-input')?.focus();
  verify('setReply', replyTo?.id === msgId, 'reply set to msg ' + msgId + ' by ' + name);
  verify('setReply', preview?.classList.contains('visible'), 'reply preview visible');
}

function cancelReply() {
  dbg('[REPLY] cancelReply');
  replyTo = null;
  document.getElementById('reply-preview')?.classList.remove('visible');
  verify('cancelReply', !replyTo, 'reply cleared');
}

// --- Reactions ---
let _reactDismissTimer = null;
let _reactActiveBtn = null;

function reactHoverIn(msgId, btn) {
  dbg('[REACT] reactHoverIn', msgId);
  clearTimeout(_reactDismissTimer);
  const existing = document.getElementById('reaction-picker');
  if (existing && existing._msgId === msgId) return;
  closeReactionPicker();
  _reactActiveBtn = btn;
  btn.classList.add('active');
  const picker = document.createElement('div');
  picker.id = 'reaction-picker';
  picker.className = 'reaction-picker';
  picker._msgId = msgId;
  picker.onmouseenter = () => clearTimeout(_reactDismissTimer);
  picker.onmouseleave = () => { _reactDismissTimer = setTimeout(closeReactionPicker, 500); };
  REACTION_KEYS.forEach(([emoji, key]) => {
    const b = document.createElement('button');
    b.textContent = emoji;
    b.onclick = (e) => { e.stopPropagation(); toggleReaction(msgId, key); closeReactionPicker(); };
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  const btnRect = btn.getBoundingClientRect();

async function resizeImage(file, maxSide) {
  dbg('[IMAGE] resizeImage', file.name);
  const bmp = await createImageBitmap(file);
  const longest = Math.max(bmp.width, bmp.height);
  if (longest <= maxSide * 1.1) { bmp.close(); return file; }
  const scale = maxSide / longest;
  const w = Math.round(bmp.width * scale);
  const h = Math.round(bmp.height * scale);
  bmp.close();
  const resized = await createImageBitmap(file, { resizeWidth: w, resizeHeight: h, resizeQuality: 'high' });
  const canvas = new OffscreenCanvas(w, h);
  canvas.getContext('bitmaprenderer').transferFromImageBitmap(resized);
  const blob = await canvas.convertToBlob({ type: 'image/webp', quality: 0.85 });
  return new File([blob], file.name.replace(/\.[^.]+$/, '.webp'), { type: 'image/webp' });
}

}

function fmtSec(s) { const m = Math.floor(s / 60); return m + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }

function showTrimEditor(file, objectUrl, duration) {
  return new Promise((resolve, reject) => {
    dbg('[TRIM] opening editor, duration:', duration);
    document.getElementById('trim-editor')?.remove();
    const maxClip = 60;
    let trimStart = 0;
    let trimEnd = Math.min(duration, maxClip);

    const overlay = document.createElement('div');
    overlay.id = 'trim-editor';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">Trim Video (max ${maxClip}s)</span>
        <button class="modal-close" id="trim-cancel">&times;</button>
      </div>
      <div class="trim-editor">
        <video id="trim-video" src="${objectUrl}" playsinline preload="auto"></video>
        <div class="trim-controls">
          <div class="trim-duration" id="trim-dur">${fmtSec(trimEnd - trimStart)} selected</div>
          <div class="trim-track" id="trim-track">
            <div class="trim-range" id="trim-range"></div>
            <div class="trim-handle" id="trim-handle-start"></div>
            <div class="trim-handle" id="trim-handle-end"></div>
            <div class="trim-playhead" id="trim-playhead"></div>
          </div>
          <div class="trim-times">
            <span id="trim-start-time">${fmtSec(0)}</span>
            <span id="trim-end-time">${fmtSec(trimEnd)}</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn-primary" id="trim-confirm">Trim & Share</button>
      </div>
    </div>`;

    const dismiss = () => { overlay.classList.remove('open'); setTimeout(() => overlay.remove(), 200); };
    overlay.addEventListener('click', () => { dismiss(); reject(new Error('Cancelled')); });
    document.body.appendChild(overlay);
    requestAnimationFrame(() => overlay.classList.add('open'));

    const video = document.getElementById('trim-video');
    const track = document.getElementById('trim-track');
    const rangeEl = document.getElementById('trim-range');
    const playhead = document.getElementById('trim-playhead');
    const handleStart = document.getElementById('trim-handle-start');
    const handleEnd = document.getElementById('trim-handle-end');
    const durLabel = document.getElementById('trim-dur');
    const startLabel = document.getElementById('trim-start-time');
    const endLabel = document.getElementById('trim-end-time');

    function updateUI() {
      const startPct = (trimStart / duration) * 100;
      const endPct = (trimEnd / duration) * 100;
      rangeEl.style.left = startPct + '%';
      rangeEl.style.width = (endPct - startPct) + '%';
      handleStart.style.left = 'calc(' + startPct + '% - 6px)';
      handleEnd.style.left = 'calc(' + endPct + '% - 6px)';
      durLabel.textContent = fmtSec(trimEnd - trimStart) + ' selected';
      startLabel.textContent = fmtSec(trimStart);
      endLabel.textContent = fmtSec(trimEnd);
    }

    video.addEventListener('timeupdate', () => {
      const pct = (video.currentTime / duration) * 100;
      playhead.style.left = pct + '%';
      if (video.currentTime >= trimEnd) { video.pause(); video.currentTime = trimStart; }
    });

    function makeDraggable(handle, getSet) {
      const onMove = (e) => {
        const rect = track.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const pct = Math.max(0, Math.min(1, x / rect.width));
        const time = pct * duration;
        getSet(time);
        updateUI();
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); };
      handle.addEventListener('mousedown', (e) => { e.preventDefault(); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); });
      handle.addEventListener('touchstart', (e) => { e.preventDefault(); document.addEventListener('touchmove', onMove); document.addEventListener('touchend', onUp); }, { passive: false });
    }

    makeDraggable(handleStart, (t) => {
      trimStart = Math.max(0, Math.min(t, trimEnd - 1));
      if (trimEnd - trimStart > maxClip) trimEnd = trimStart + maxClip;
      video.currentTime = trimStart;
    });
    makeDraggable(handleEnd, (t) => {
      trimEnd = Math.min(duration, Math.max(t, trimStart + 1));
      if (trimEnd - trimStart > maxClip) trimStart = trimEnd - maxClip;
      video.currentTime = trimEnd - 0.1;
    });

    track.addEventListener('click', (e) => {
      if (e.target === handleStart || e.target === handleEnd) return;
      const rect = track.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      video.currentTime = pct * duration;
      video.play();
    });

    document.getElementById('trim-cancel').onclick = () => { dismiss(); reject(new Error('Cancelled')); };
    document.getElementById('trim-confirm').onclick = () => {
      dbg('[TRIM] confirmed, start:', trimStart.toFixed(1), 'end:', trimEnd.toFixed(1), 'duration:', (trimEnd - trimStart).toFixed(1));
      dismiss();
      resolve({ start: trimStart, end: trimEnd });
    };

    updateUI();
    video.currentTime = 0;
  });
}

async function processVideo(file) {
  dbg('[VIDEO] processVideo start, file:', file.name, file.type, (file.size / 1024 / 1024).toFixed(1) + 'MB');

  const vid = document.createElement('video');
  vid.preload = 'metadata';
  const objectUrl = URL.createObjectURL(file);
  vid.src = objectUrl;
  await new Promise((r, e) => {
    vid.onloadedmetadata = r;
    vid.onerror = (err) => { dbg('[VIDEO] metadata load error:', err); e(new Error('Cannot read video file')); };
  });

  const duration = vid.duration;
  const srcW = vid.videoWidth;
  const srcH = vid.videoHeight;
  dbg('[VIDEO] metadata loaded, duration:', duration, 'resolution:', srcW + 'x' + srcH);

  let trim = null;
  if (duration > 62) {
    dbg('[VIDEO] duration > 60s, opening trim editor');
    trim = await showTrimEditor(file, objectUrl, duration);
  }
  URL.revokeObjectURL(objectUrl);

  const srcBitrate = (file.size * 8) / duration;
  const mb = await loadMediabunny();
  const mbInput = new mb.Input({ source: new mb.BlobSource(file), formats: mb.ALL_FORMATS });
  const videoTrack = await mbInput.getPrimaryVideoTrack();
  const audioTrack = await mbInput.getPrimaryAudioTrack().catch(() => null);
  let srcFps = 30;
  try {
    const stats = await videoTrack.computePacketStats(100);
    srcFps = Math.round(stats.averagePacketRate);
    dbg('[VIDEO] packetStats: fps=' + srcFps + ' bitrate=' + (stats.averageBitrate / 1_000_000).toFixed(1) + 'Mbps count=' + stats.packetCount);
  } catch (e) { dbg('[VIDEO] computePacketStats failed:', e.message); }
  const srcAudioCodec = audioTrack ? await audioTrack.getCodec() : null;

  const oversize = srcW > 1920 || srcH > 1080;
  const highBitrate = srcBitrate > 10_000_000;
  const highFps = srcFps > 30;
  const needsAudioRecode = srcAudioCodec && srcAudioCodec !== 'aac';
  const needsTranscode = oversize || highBitrate || highFps || needsAudioRecode || trim !== null;

  dbg('[VIDEO] srcBitrate:', (srcBitrate / 1_000_000).toFixed(1) + 'Mbps, fps:', srcFps, 'audio:', srcAudioCodec,
    'oversize:', oversize, 'highBitrate:', highBitrate, 'highFps:', highFps, 'audioRecode:', needsAudioRecode,
    'needsTranscode:', needsTranscode, trim ? ('trim ' + trim.start.toFixed(1) + '-' + trim.end.toFixed(1)) : '');

  if (!needsTranscode) {
    dbg('[VIDEO] no processing needed, using original file');
    return file;
  }

  showToast('Processing video...');

  const output = new mb.Output({
    format: new mb.Mp4OutputFormat(),
    target: new mb.BufferTarget(),
  });

  let videoCodec = 'avc';
  try {
    const hevcSupport = await VideoEncoder.isConfigSupported({
      codec: 'hvc1.1.6.L120.B0',
      width: 1920, height: 1080,
      bitrate: 3_000_000,
      hardwareAcceleration: 'prefer-hardware',
    });
    if (hevcSupport.supported) videoCodec = 'hevc';
    dbg('[VIDEO] HEVC support:', hevcSupport.supported);
  } catch (e) { dbg('[VIDEO] HEVC check failed:', e.message); }
  dbg('[VIDEO] selected codec:', videoCodec);

  const videoOpts = { hardwareAcceleration: 'prefer-hardware' };
  if (oversize) {
    const scale = Math.min(1920 / srcW, 1080 / srcH);
    videoOpts.width = Math.round(srcW * scale);
    videoOpts.height = Math.round(srcH * scale);
    videoOpts.fit = 'contain';
  }
  if (oversize || highBitrate) {
    videoOpts.codec = videoCodec;
    videoOpts.bitrate = videoCodec === 'hevc' ? 3_000_000 : 4_000_000;
  }
  if (highFps) {
    videoOpts.frameRate = Math.round(srcFps / 2);
    videoOpts.forceTranscode = true;
    if (!videoOpts.codec) videoOpts.codec = videoCodec;
    if (!videoOpts.bitrate) videoOpts.bitrate = videoCodec === 'hevc' ? 3_000_000 : 4_000_000;
  }
  dbg('[VIDEO] videoOpts:', JSON.stringify(videoOpts));

  const audioOpts = needsAudioRecode ? { codec: 'aac', bitrate: 128_000 } : {};
  const convOpts = { input: mbInput, output, video: videoOpts, audio: audioOpts };
  if (trim) convOpts.trim = { start: trim.start, end: trim.end };

  dbg('[VIDEO] initializing conversion...');
  const conversion = await mb.Conversion.init(convOpts);

  if (!conversion.isValid) {
    dbg('[VIDEO] conversion not valid, discarded:', conversion.discardedTracks);
    throw new Error('Cannot process this video format');
  }
  dbg('[VIDEO] conversion valid, utilized tracks:', conversion.utilizedTracks);

  conversion.onProgress = (p) => {
    dbg('[VIDEO] progress:', Math.round(p * 100) + '%');
    showToast('Processing video ' + Math.round(p * 100) + '%...');
  };

  dbg('[VIDEO] executing conversion...');
  await conversion.execute();

  const buf = output.target.buffer;
  dbg('[VIDEO] conversion done, output size:', (buf.byteLength / 1024 / 1024).toFixed(1) + 'MB');
  return new File([buf], file.name.replace(/\.[^.]+$/, '.mp4'), { type: 'video/mp4' });
}

function uploadVideo() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'video/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    dbg('[VIDEO] file selected:', file.name, file.type, (file.size / 1024 / 1024).toFixed(1) + 'MB');
    try {
      const processed = await processVideo(file);
      if (processed.size > 100 * 1024 * 1024) {
        dbg('[VIDEO] rejected: processed size', (processed.size / 1024 / 1024).toFixed(1) + 'MB > 100MB');
        showToast('Video too large (max 100MB)'); return;
      }
      dbg('[VIDEO] uploading', (processed.size / 1024 / 1024).toFixed(1) + 'MB...');
      showToast('Uploading video...');
      const form = new FormData(); form.append('file', processed);
      const resp = await fetch(API + '/upload/video', { method: 'POST', body: form, credentials: 'include' });
      dbg('[VIDEO] upload response status:', resp.status);
      if (!resp.ok) {
        const err = await resp.text();
        dbg('[VIDEO] upload error:', err);
        throw new Error('Upload failed: ' + resp.status);
      }
      const result = await resp.json();
      dbg('[VIDEO] upload result:', result);
      sendChatMessage('video', JSON.stringify(result));
      showToast('Video shared');
    } catch (e) {
      dbg('[VIDEO] error:', e.message, e.stack);
      showToast(e.message || 'Video upload failed');
    }
  };
  input.click();
}

let _editAvatarUrl = '';
let _editCountry = '';

function openEditCountryPicker() {
  dbg('[PROFILE] openEditCountryPicker');
  const picker = document.getElementById('edit-country-picker');
  if (picker.classList.contains('open')) return;
  picker.classList.add('open');
  const input = document.getElementById('edit-country-input');
  input.value = '';
  input.placeholder = 'Search country...';
  let hlIdx = 0;
  renderEditCountryList('', 0);
  input.oninput = () => { hlIdx = 0; renderEditCountryList(input.value, hlIdx); };
  input.onkeydown = (e) => {
    if (e.key === 'Escape') { closeEditCountryPicker(); return; }
    const items = document.querySelectorAll('#edit-country-list .country-item[data-code]');
    if (e.key === 'ArrowDown') { e.preventDefault(); hlIdx = Math.min(hlIdx + 1, items.length - 1); highlightCountryItem(items, hlIdx); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); hlIdx = Math.max(hlIdx - 1, 0); highlightCountryItem(items, hlIdx); }
    else if (e.key === 'Enter') { e.preventDefault(); if (items[hlIdx]) items[hlIdx].click(); }
  };
  setTimeout(() => document.addEventListener('click', _editCountryOutsideClick), 10);
}

function _editCountryOutsideClick(e) {
  if (!e.target.closest('#edit-country-picker')) closeEditCountryPicker();
}

function closeEditCountryPicker() {
  dbg('[PROFILE] closeEditCountryPicker');
  const picker = document.getElementById('edit-country-picker');
  if (!picker) return;
  picker.classList.remove('open');
  const input = document.getElementById('edit-country-input');
  input.placeholder = 'Country';
  input.oninput = null;
  input.onkeydown = null;
  if (_editCountry) {
    const name = COUNTRIES.find(c => c[0] === _editCountry)?.[1] || '';
    input.value = FLAG(_editCountry) + ' ' + name;
  } else {
    input.value = '';
  }
  document.removeEventListener('click', _editCountryOutsideClick);
}

function renderEditCountryList(query, hlIdx) {
  const list = document.getElementById('edit-country-list');
  if (!list) return;
  const q = query.toLowerCase();
  const matchStart = (haystack, needle) => haystack.toLowerCase().startsWith(needle) || haystack.split(/[\s-]+/).some(w => w.toLowerCase().startsWith(needle));
  const filtered = COUNTRIES.filter(([code, name, alt]) => matchStart(name, q) || code.toLowerCase().startsWith(q) || (alt && alt.split(/\s+/).some(w => w.toLowerCase().startsWith(q))));
  list.innerHTML = filtered.map(([code, name], i) =>
    `<div class="country-item${i === (hlIdx || 0) ? ' highlighted' : ''}" data-code="${code}" onclick="selectEditCountry('${code}')">`
    + `<span class="flag">${FLAG(code)}</span>${escapeHtml(name)}</div>`
  ).join('') || '<div class="country-item" style="color:var(--color-muted)">No results</div>';
}

function selectEditCountry(code) {

  _editCountry = code;
