# Manual overrides for artist data.
# These are applied after scraping and take priority over scraped values.
# When a link (instagram, soundcloud, spotify) is changed, its follower
# count is automatically cleared and re-fetched on the next run.
#
# Supported fields: instagram, soundcloud, spotify, linktree, youtube, photo
# Set a field to false to mark it as non-existent (stops re-fetching).
#
# Template — copy and fill in:
#
#   [Artist Name]
#   instagram = "https://www.instagram.com/handle/"
#   soundcloud = "https://soundcloud.com/handle"
#   spotify = "https://open.spotify.com/artist/id"
#   linktree = "https://linktr.ee/handle"
#   youtube = "https://www.youtube.com/@handle"
#   photo = "https://example.com/photo.jpg"

[Amoral]
instagram = "https://www.instagram.com/amoral___dj/"

["Alba Heidari"]
instagram = "https://www.instagram.com/alba.heidari/"

[Barker]
instagram = "https://www.instagram.com/barker_volteklabs/"

[Upsammy]
instagram = "https://www.instagram.com/upsammy_/"

["Rødhåd"]
instagram = "https://www.instagram.com/rodhad_wsnwg/"

[Serge]
soundcloud = "https://soundcloud.com/sergeclone"

[ROD]
soundcloud = "https://soundcloud.com/bennyrodrigues"
photo = "https://cdn.amsterdam-dance-event.nl/images/images/transforms/artists-speakers/_1802xAUTO_crop_center-center_none/19883/Benny1_57553-1739374845.webp"

[Function]
spotify = "https://open.spotify.com/artist/6eu3TBnYM3SrkUU59SFhgp"
soundcloud = false

# YouTube search names — override the name used when searching for DJ sets.
# Key: lineup name, Value: YouTube search term.
[youtube_names]
"Serge" = "Serge Clone"

