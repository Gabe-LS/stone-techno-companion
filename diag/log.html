<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Diagnostic Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#111;color:#eee;padding:12px;font-size:13px}
h1{font-size:18px;margin-bottom:4px;color:#fc6}
.subtitle{color:#888;margin-bottom:12px;font-size:12px}
.nav{display:flex;gap:8px;margin-bottom:12px}
.nav a{color:#6cf;font-size:13px}
.toolbar{display:flex;gap:8px;margin-bottom:12px}
button{background:#222;color:#eee;border:1px solid #444;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer}
button:active{background:#444}
button.danger{border-color:#5a2a2a;color:#f88}
.count{color:#888;font-size:12px;margin-bottom:8px}
.log-entry{border-bottom:1px solid #1a1a1a;padding:6px 0;font-size:12px;font-family:monospace}
.log-entry:hover{background:#1a1a1a}
.ts{color:#555;font-size:11px}
.src{display:inline-block;min-width:60px;padding:1px 4px;border-radius:3px;font-size:10px;font-weight:600;text-align:center}
.src-sw{background:#2a1a3a;color:#c8f}
.src-page-a{background:#1a2a3a;color:#6cf}
.src-page-b{background:#1a3a1a;color:#6f6}
.ev{color:#fc6;font-weight:600}
.detail{color:#aaa;word-break:break-all}
.vis{color:#666;font-size:10px}
.url-col{color:#555;font-size:10px}
#log{max-height:calc(100vh - 180px);overflow-y:auto;border:1px solid #222;border-radius:8px;padding:4px}
.filter-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.filter-btn{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;color:#aaa}
.filter-btn.active{border-color:#6cf;color:#6cf}
</style>
</head><body>

<h1>Diagnostic Log</h1>
<p class="subtitle">All events from SW, Page A, and Page B. Stored in IndexedDB.</p>

<div class="nav">
  <a href="/">Page A (source)</a>
  <a href="/target">Page B (target)</a>
</div>

<div class="toolbar">
  <button onclick="refresh()">Refresh</button>
  <button onclick="autoRefreshToggle()" id="btn-auto">Auto-refresh: OFF</button>
  <button onclick="copyLog()">Copy</button>
  <button onclick="clearLog()" class="danger">Clear All</button>
</div>

<div class="filter-row" id="filters">
  <span class="filter-btn active" data-src="all" onclick="toggleFilter('all')">All</span>
  <span class="filter-btn active" data-src="sw" onclick="toggleFilter('sw')">SW</span>
  <span class="filter-btn active" data-src="page-a" onclick="toggleFilter('page-a')">Page A</span>
  <span class="filter-btn active" data-src="page-b" onclick="toggleFilter('page-b')">Page B</span>
</div>

<div class="count" id="count"></div>
<div id="log"></div>

<script src="/shared.js"></script>
<script>
var _entries = [];
var _autoInterval = null;
var _filters = { all: true, sw: true, 'page-a': true, 'page-b': true };

function srcClass(src) {
  if (src === 'sw') return 'src-sw';
  if (src === 'page-a') return 'src-page-a';
  if (src === 'page-b') return 'src-page-b';
  return '';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderLog() {
  var el = document.getElementById('log');
  var filtered = _entries;
  if (!_filters.all) {
    filtered = _entries.filter(function (e) { return _filters[e.src]; });
  }
  document.getElementById('count').textContent = filtered.length + ' / ' + _entries.length + ' entries';
  var html = filtered.map(function (e) {
    var ts = (e.ts || '').slice(11, 23);
    var detail = e.detail || '';
    try {
      var parsed = JSON.parse(detail);
      detail = JSON.stringify(parsed, null, 1);
    } catch (_) {}
    return '<div class="log-entry">'
      + '<span class="ts">' + esc(ts) + '</span> '
      + '<span class="src ' + srcClass(e.src) + '">' + esc(e.src) + '</span> '
      + '<span class="ev">' + esc(e.ev) + '</span>'
      + (detail ? '<br><span class="detail">' + esc(detail) + '</span>' : '')
      + '<br><span class="vis">vis=' + esc(e.vis || '?') + '</span>'
      + ' <span class="url-col">url=' + esc(e.url || '?') + '</span>'
      + '</div>';
  }).join('');
  el.innerHTML = html || '<div style="color:#666;padding:20px;text-align:center">No log entries yet. Go to Page A, subscribe to push, send a test, then come back.</div>';
  el.scrollTop = el.scrollHeight;
}

function refresh() {
  diagReadAll().then(function (entries) {
    _entries = entries;
    renderLog();
  });
}

function toggleFilter(src) {
  if (src === 'all') {
    var allOn = _filters.all;
    _filters = { all: !allOn, sw: !allOn, 'page-a': !allOn, 'page-b': !allOn };
  } else {
    _filters[src] = !_filters[src];
    _filters.all = _filters.sw && _filters['page-a'] && _filters['page-b'];
  }
  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.classList.toggle('active', _filters[btn.dataset.src]);
  });
  renderLog();
}

function autoRefreshToggle() {
  if (_autoInterval) {
    clearInterval(_autoInterval);
    _autoInterval = null;
    document.getElementById('btn-auto').textContent = 'Auto-refresh: OFF';
  } else {
    _autoInterval = setInterval(refresh, 1000);
    document.getElementById('btn-auto').textContent = 'Auto-refresh: ON';
  }
}

function clearLog() {
  diagClear().then(function () {
    _entries = [];
    renderLog();
  });
}

function copyLog() {
  var text = _entries.map(function (e) {
    return [e.ts, e.src, e.ev, e.detail, 'vis=' + e.vis, 'url=' + e.url].join(' | ');
  }).join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () {
      alert('Copied ' + _entries.length + ' entries');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    alert('Copied ' + _entries.length + ' entries');
  }
}

diagLog('log-page', 'opened', 'entries will be read');
refresh();
</script>
</body></html>
