<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Page B - Target</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#0a1a0a;color:#eee;padding:16px;font-size:14px}
h1{font-size:20px;margin-bottom:4px;color:#6f6}
.subtitle{color:#888;margin-bottom:16px;font-size:12px}
h2{font-size:13px;margin:20px 0 8px;color:#666;text-transform:uppercase;letter-spacing:1px;border-top:1px solid #222;padding-top:12px}
.state{display:grid;grid-template-columns:auto 1fr;gap:2px 12px;font-size:13px;margin-bottom:8px}
.state dt{color:#666}.state dd{color:#ccc;word-break:break-all}
pre{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-bottom:8px}
.nav{display:flex;gap:8px;margin-bottom:16px}
.nav a{color:#6cf;font-size:13px}
.success{background:#1a3a1a;border:2px solid #3a7a3a;border-radius:12px;padding:16px;margin-bottom:16px;text-align:center}
.success h2{color:#6f6;border:none;margin:0 0 4px;padding:0}
.success p{color:#afa;font-size:13px;margin:0}
</style>
</head><body>

<h1>PAGE B - Target</h1>
<p class="subtitle">If you see this page after tapping a notification, the navigation worked.</p>

<div class="nav">
  <a href="/">Page A (source)</a>
  <a href="/log">View Log</a>
</div>

<div class="success">
  <h2>Navigation succeeded</h2>
  <p id="arrival-info"></p>
</div>

<h2>Arrival Details</h2>
<dl class="state" id="state"></dl>

<h2>Cache State at Arrival</h2>
<pre id="cache-state">checking...</pre>

<h2>Events on This Page</h2>
<pre id="events"></pre>

<script src="/shared.js"></script>
<script>
var _pageEvents = [];
var _arrivalTime = new Date().toISOString();

function logEvent(ev, detail) {
  var entry = { t: new Date().toISOString().slice(11, 23), ev: ev, d: detail || '' };
  _pageEvents.push(entry);
  renderEvents();
  diagLog('page-b', ev, detail || '');
}

function renderEvents() {
  var el = document.getElementById('events');
  el.textContent = _pageEvents.map(function (e) {
    return '[' + e.t + '] ' + e.ev + (e.d ? ' | ' + e.d : '');
  }).join('\n');
}

function updateState() {
  var standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  var perf = performance.getEntriesByType && performance.getEntriesByType('navigation')[0];
  var navType = perf ? perf.type : (performance.navigation ? performance.navigation.type : '?');
  document.getElementById('state').innerHTML =
    '<dt>Full URL</dt><dd>' + location.href + '</dd>' +
    '<dt>Pathname</dt><dd>' + location.pathname + '</dd>' +
    '<dt>Search</dt><dd>' + (location.search || '(none)') + '</dd>' +
    '<dt>Hash</dt><dd>' + (location.hash || '(none)') + '</dd>' +
    '<dt>Referrer</dt><dd>' + (document.referrer || '(none)') + '</dd>' +
    '<dt>Nav Type</dt><dd>' + navType + '</dd>' +
    '<dt>Standalone</dt><dd>' + standalone + '</dd>' +
    '<dt>Visibility</dt><dd>' + document.visibilityState + '</dd>' +
    '<dt>Arrival</dt><dd>' + _arrivalTime + '</dd>';
  document.getElementById('arrival-info').textContent =
    'Arrived at ' + _arrivalTime.slice(11, 23) + ' via ' + (navType || '?') +
    ' | URL: ' + location.pathname + location.search + location.hash;
}

function checkCache() {
  diagCheckCache().then(function (val) {
    document.getElementById('cache-state').textContent =
      'diag-push/_nav: ' + (val ? '"' + val + '"' : '(empty)') +
      '\nchecked at: ' + new Date().toISOString().slice(11, 23);
    if (val) {
      logEvent('cache-found-on-target', val);
      diagDeleteCache();
    }
  });
}

document.addEventListener('visibilitychange', function () {
  logEvent('visibilitychange', document.visibilityState);
  if (!document.hidden) { updateState(); checkCache(); }
});
window.addEventListener('focus', function () { logEvent('focus', ''); updateState(); checkCache(); });
window.addEventListener('pageshow', function (e) { logEvent('pageshow', 'persisted=' + e.persisted); updateState(); checkCache(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function (e) {
    logEvent('sw-postMessage', JSON.stringify(e.data));
  });
}

logEvent('page-load', 'pathname=' + location.pathname + ' search=' + location.search + ' hash=' + location.hash);
updateState();
checkCache();
</script>
</body></html>
