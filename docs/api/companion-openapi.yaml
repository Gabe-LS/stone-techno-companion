  /{path}:
    parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [static]
      summary: SPA catch-all / clean-URL static page resolver
      description: >-
        Registered last, after every other route (including the chat module's own
        routes, mounted just above it). Behavior, in order: (1) if `path` starts
        with "chat", returns 404 (chat is served by its own module and must never
        fall through here); (2) if `path` matches `[a-z0-9][a-z0-9-]*` (no slashes
        or dots -- traversal-safe) and `static/pages/{path}.html` exists, serves
        that file with Cache-Control no-cache (this is how clean-URL pages like
        `/transport` are served with no per-page route needed); (3) otherwise
        serves `static/index.html` (the SPA shell) with Cache-Control no-store, or
        404 if that file is missing.
      responses:
        "200":
          description: Either a clean-URL static page or the SPA shell, per the resolution order above.
          headers:
            Cache-Control:
              schema:
                type: string
                description: '"no-cache" for a clean-URL static page, "no-store" for the SPA shell.'
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Path starts with "chat", or no static page matched and index.html is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
