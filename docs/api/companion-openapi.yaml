  /dop/{z}/{x}/{y}.jpg:
    get:
      tags: [static]
      summary: NRW aerial imagery XYZ tile proxy (Geobasis NRW WMS, disk-cached)
      description: >-
        Renders a web-mercator tile from the Geobasis NRW WMS on first request and
        disk-caches it under static/vendor/dop-cache/ so repeat views are instant and
        cost no upstream call. Guarded to zoom 12-20 and to the NRW lat/lon
        bounding box (50.0-52.7 N, 5.7-9.6 E) so the proxy cannot be used to mirror
        arbitrary tiles outside the region. AS-BUILT: out-of-range zoom/tile-index
        or out-of-NRW tiles both return 404 (not 400), and an upstream fetch
        failure or a non-image content-type from the WMS returns 502.
      parameters:
        - name: z
          in: path
          required: true
          schema:
            type: integer
            minimum: 12
            maximum: 20
        - name: x
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
        - name: "y"
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: JPEG tile.
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=2592000"
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: z/x/y out of the allowed range, or the tile's center falls outside the NRW bounding box.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: z/x/y path segment is not an integer (FastAPI's automatic type coercion failure, array-shaped detail).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream WMS fetch failed, or responded with a non-image content type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

